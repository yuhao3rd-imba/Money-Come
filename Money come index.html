<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Product RUNDOWN</title>
    <style>
:root {
  color-scheme: dark;
  --bg: #0b0e12;
  --bg-2: #10151c;
  --panel: #151a22;
  --panel-2: #1b222c;
  --line: #2a3340;
  --line-soft: rgba(255, 255, 255, 0.07);
  --text: #f3f5f0;
  --muted: #9aa6ad;
  --quiet: #64727b;
  --cyan: #50d7e8;
  --cyan-2: #1b8ea1;
  --amber: #f0b45d;
  --green: #74d28c;
  --red: #ee6d6d;
  --blue: #7da7ff;
  --shadow: 0 24px 70px rgba(0, 0, 0, 0.34);
  --radius: 8px;
  --radius-sm: 6px;
  font-family:
    Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
    sans-serif;
}

* {
  box-sizing: border-box;
}

body {
  margin: 0;
  min-height: 100vh;
  background:
    linear-gradient(90deg, rgba(80, 215, 232, 0.05), transparent 34%),
    radial-gradient(circle at 80% 4%, rgba(240, 180, 93, 0.08), transparent 28%),
    var(--bg);
  color: var(--text);
  letter-spacing: 0;
}

button,
input,
select,
textarea {
  font: inherit;
}

button {
  cursor: pointer;
}

.app-shell {
  min-height: 100vh;
}

.layout {
  display: grid;
  grid-template-columns: 248px minmax(620px, 1fr) 340px;
  min-height: 100vh;
}

.sidebar {
  border-right: 1px solid var(--line-soft);
  padding: 22px 18px;
  background: rgba(11, 14, 18, 0.82);
}

.brand {
  position: relative;
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 28px;
}

.brand-mark {
  display: grid;
  place-items: center;
  width: 38px;
  height: 38px;
  border: 1px solid rgba(80, 215, 232, 0.36);
  border-radius: var(--radius);
  color: var(--cyan);
  background: rgba(80, 215, 232, 0.08);
}

.brand-title {
  margin: 0;
  font-size: 15px;
  font-weight: 760;
}

.brand-subtitle {
  margin: 2px 0 0;
  color: var(--muted);
  font-size: 12px;
}

.brand-tools {
  position: relative;
  margin-left: auto;
}

.brand-menu-button {
  display: grid;
  place-items: center;
  width: 30px;
  height: 30px;
  border: 1px solid var(--line);
  border-radius: 6px;
  color: var(--muted);
  background: rgba(255, 255, 255, 0.02);
  font-size: 18px;
  line-height: 1;
}

.brand-menu {
  position: absolute;
  top: calc(100% + 6px);
  right: 0;
  z-index: 12;
  display: none;
  min-width: 136px;
  padding: 6px;
  border: 1px solid var(--line);
  border-radius: var(--radius-sm);
  background: #111720;
  box-shadow: var(--shadow);
}

.brand-tools:hover .brand-menu,
.brand-tools:focus-within .brand-menu {
  display: grid;
  gap: 4px;
}

.brand-menu button,
.brand-menu label {
  display: flex;
  align-items: center;
  min-height: 30px;
  padding: 0 8px;
  border: 0;
  border-radius: 5px;
  color: var(--text);
  background: transparent;
  font-size: 12px;
  white-space: nowrap;
}

.brand-menu button:hover,
.brand-menu label:hover {
  background: var(--panel-2);
}

.brand-menu input {
  display: none;
}

.nav {
  display: grid;
  gap: 6px;
  margin-bottom: 24px;
}

.nav button,
.icon-button,
.phase-action,
.ghost-button,
.primary-button {
  border: 0;
  color: var(--text);
  background: transparent;
}

.nav button {
  display: flex;
  align-items: center;
  gap: 10px;
  width: 100%;
  min-height: 40px;
  padding: 0 10px;
  border-radius: var(--radius-sm);
  color: var(--muted);
  text-align: left;
  font-size: 13px;
}

.nav button.active {
  color: var(--text);
  background: var(--panel);
}

.nav svg,
.icon-button svg,
.ghost-button svg,
.primary-button svg {
  width: 16px;
  height: 16px;
  stroke-width: 2;
}

.sidebar-section {
  padding-top: 18px;
  border-top: 1px solid var(--line-soft);
}

.section-head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 8px;
  margin-bottom: 12px;
}

.section-title {
  margin: 0;
  color: var(--quiet);
  font-size: 11px;
  font-weight: 760;
  text-transform: uppercase;
}

.product-scope {
  display: grid;
  gap: 8px;
  margin: 0 0 10px;
  padding: 9px;
  border: 1px solid var(--line);
  border-radius: var(--radius-sm);
  background: rgba(255, 255, 255, 0.025);
}

.product-scope > span {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 8px;
  color: var(--muted);
  font-size: 11px;
}

.product-scope strong {
  color: var(--amber);
  font-size: 13px;
}

.scope-tabs {
  display: grid;
  grid-template-columns: repeat(3, minmax(0, 1fr));
  gap: 4px;
}

.scope-tabs button {
  min-height: 26px;
  border: 1px solid var(--line);
  border-radius: 5px;
  color: var(--muted);
  background: rgba(255, 255, 255, 0.02);
  font-size: 11px;
  font-weight: 720;
}

.scope-tabs button.active {
  color: #071014;
  border-color: var(--amber);
  background: var(--amber);
}

.project-list {
  display: grid;
  gap: 10px;
}

.project-card {
  padding: 12px;
  border: 1px solid var(--line);
  border-radius: var(--radius);
  background: rgba(21, 26, 34, 0.72);
}

.project-card.active {
  border-color: rgba(80, 215, 232, 0.5);
  background: rgba(27, 34, 44, 0.9);
}

.project-card.expanded {
  box-shadow: inset 0 0 0 1px rgba(80, 215, 232, 0.12);
}

.project-card h2 {
  margin: 0 0 8px;
  font-size: 15px;
  line-height: 1.25;
}

.project-summary {
  display: grid;
  grid-template-columns: auto 1fr;
  align-items: center;
  gap: 10px;
  width: 100%;
  padding: 0;
  border: 0;
  color: var(--text);
  background: transparent;
  text-align: left;
}

.project-copy {
  min-width: 0;
}

.project-copy strong,
.project-copy small {
  display: block;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.project-copy strong {
  font-size: 13px;
  line-height: 1.25;
}

.project-copy small {
  margin-top: 4px;
  color: var(--muted);
  font-size: 11px;
}

.project-expanded {
  display: grid;
  gap: 10px;
  margin-top: 10px;
  padding-top: 10px;
  border-top: 1px solid var(--line-soft);
}

.project-actions,
.urgency-picker {
  display: flex;
  align-items: center;
  gap: 7px;
  flex-wrap: wrap;
}

.project-actions {
  justify-content: flex-start;
}

.urgency-dot,
.urgency-choice {
  display: inline-block;
  border-radius: 50%;
  flex: 0 0 auto;
}

.urgency-dot {
  width: 11px;
  height: 11px;
  box-shadow: 0 0 0 4px rgba(255, 255, 255, 0.04);
}

.urgency-choice {
  width: 18px;
  height: 18px;
  border: 2px solid transparent;
  background: var(--quiet);
}

.urgency-choice.selected {
  border-color: var(--text);
}

.urgency-dot.red,
.urgency-choice.red {
  background: var(--red);
}

.urgency-dot.green,
.urgency-choice.green {
  background: var(--green);
}

.urgency-dot.yellow,
.urgency-choice.yellow {
  background: var(--amber);
}

.project-confirm {
  justify-self: start;
  min-height: 28px;
  padding: 0 9px;
  border: 1px solid rgba(238, 109, 109, 0.42);
  border-radius: 5px;
  color: #ff9a9a;
  background: rgba(238, 109, 109, 0.1);
  font-size: 11px;
}

.project-confirm.danger {
  color: #fff;
  border-color: var(--red);
  background: var(--red);
  font-weight: 820;
}

.mini-icon.disabled,
.mini-icon:disabled {
  color: var(--quiet);
  border-color: var(--line);
  background: rgba(255, 255, 255, 0.015);
  cursor: not-allowed;
  opacity: 0.58;
}

.meta-row {
  display: flex;
  justify-content: space-between;
  gap: 8px;
  color: var(--muted);
  font-size: 12px;
}

.progress-rail {
  height: 7px;
  margin: 14px 0 10px;
  overflow: hidden;
  border-radius: 20px;
  background: #0d1117;
}

.progress-fill {
  height: 100%;
  border-radius: inherit;
  background: linear-gradient(90deg, var(--cyan), var(--amber));
}

.tag-list {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  margin-top: 12px;
}

.tag {
  padding: 5px 7px;
  border: 1px solid var(--line);
  border-radius: var(--radius-sm);
  color: var(--muted);
  background: rgba(255, 255, 255, 0.03);
  font-size: 11px;
}

.main {
  padding: 22px;
  min-width: 0;
}

.topbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 18px;
  margin-bottom: 20px;
}

.title-block {
  flex: 1 1 auto;
  min-width: 0;
}

.title-block h1 {
  margin: 0;
  font-size: clamp(24px, 3vw, 40px);
  line-height: 1.05;
  font-weight: 780;
}

.title-row {
  display: flex;
  align-items: center;
  gap: 10px;
  flex-wrap: wrap;
}

.title-add-button {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 30px;
  height: 30px;
  border: 1px solid var(--line);
  border-radius: 6px;
  color: var(--amber);
  background: rgba(240, 180, 93, 0.08);
}

.title-add-button svg {
  width: 15px;
  height: 15px;
}

.member-chips {
  display: flex;
  align-items: center;
  gap: 8px;
  flex-wrap: wrap;
  margin-left: 8px;
}

.member-chip > span:first-child {
  pointer-events: none;
}

.member-chip {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  min-height: 28px;
  padding: 0 8px;
  border: 1px solid var(--line);
  border-radius: 5px;
  color: var(--muted);
  background: rgba(255, 255, 255, 0.02);
  font-size: 11px;
}

.member-chip.active {
  color: #071014;
  border-color: var(--cyan);
  background: var(--cyan);
  font-weight: 760;
}

.member-chip .member-remove {
  display: inline-grid;
  place-items: center;
  width: 16px;
  height: 16px;
  border-radius: 50%;
  background: rgba(7, 16, 20, 0.12);
  color: inherit;
  pointer-events: auto;
}

.member-chip .member-remove svg {
  width: 12px;
  height: 12px;
}

.title-block p {
  max-width: 620px;
  margin: 8px 0 0;
  color: var(--muted);
  font-size: 13px;
  line-height: 1.5;
}

.project-note-line {
  display: flex;
  align-items: flex-start;
  width: min(1120px, 100%);
  margin-top: 8px;
}

.project-note-line textarea {
  width: 100%;
  min-height: 56px;
  border: 1px solid transparent;
  border-radius: 6px;
  color: var(--muted);
  background: transparent;
  font-size: 13px;
  line-height: 1.45;
  padding: 0;
  resize: none;
}

.project-note-line textarea:focus {
  border-color: var(--line);
  background: rgba(255, 255, 255, 0.03);
  color: var(--text);
  padding: 6px 8px;
  outline: none;
}

.toolbar {
  display: flex;
  align-items: center;
  gap: 8px;
  flex-wrap: wrap;
}

.segmented {
  display: flex;
  padding: 3px;
  border: 1px solid var(--line);
  border-radius: var(--radius);
  background: #0e1319;
}

.segmented button {
  min-height: 30px;
  padding: 0 10px;
  border: 0;
  border-radius: 5px;
  color: var(--muted);
  background: transparent;
  font-size: 12px;
}

.segmented button.active {
  color: var(--text);
  background: var(--panel-2);
}

.primary-button,
.ghost-button,
.icon-button,
.panel-action-button {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  min-height: 36px;
  border-radius: var(--radius-sm);
}

.panel-action-button {
  gap: 8px;
  padding: 0 10px;
  border: 1px solid var(--line);
  color: var(--text);
  background: rgba(255, 255, 255, 0.02);
  font-size: 12px;
  white-space: nowrap;
}

.panel-action-button.done {
  color: #071014;
  border-color: var(--green);
  background: var(--green);
  font-weight: 800;
}

.panel-action-button svg,
.primary-button svg,
.ghost-button svg {
  width: 16px;
  height: 16px;
  flex: 0 0 auto;
}

.primary-button {
  gap: 8px;
  padding: 0 12px;
  color: #071014;
  background: var(--cyan);
  font-size: 13px;
  font-weight: 720;
}

.ghost-button {
  gap: 8px;
  padding: 0 10px;
  border: 1px solid var(--line);
  color: var(--muted);
  background: rgba(255, 255, 255, 0.02);
  font-size: 12px;
}

.ghost-button.danger,
.mini-button.danger,
.mini-icon.danger {
  color: #ff9a9a;
  border-color: rgba(238, 109, 109, 0.38);
}

.filter-control {
  display: flex;
  align-items: center;
  gap: 8px;
  min-height: 36px;
  padding: 0 8px 0 10px;
  border: 1px solid var(--line);
  border-radius: var(--radius-sm);
  background: rgba(255, 255, 255, 0.02);
}

.filter-control label {
  display: inline-flex;
  align-items: center;
  gap: 7px;
  color: var(--muted);
  font-size: 12px;
  white-space: nowrap;
}

.filter-control svg {
  width: 16px;
  height: 16px;
}

.filter-control select {
  height: 28px;
  min-width: 96px;
  border: 0;
  border-radius: 5px;
  color: var(--text);
  background: var(--panel-2);
  font-size: 12px;
  padding: 0 8px;
}

.filter-chips {
  display: flex;
  align-items: center;
  justify-content: flex-end;
  gap: 6px;
  flex-wrap: wrap;
}

.filter-chip {
  min-height: 28px;
  padding: 0 8px;
  border: 1px solid var(--line);
  border-radius: 5px;
  color: var(--muted);
  background: rgba(255, 255, 255, 0.02);
  font-size: 11px;
}

.filter-chip.active {
  color: #071014;
  border-color: var(--cyan);
  background: var(--cyan);
  font-weight: 760;
}

.add-inline-button {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  min-height: 28px;
  padding: 0 10px;
  border: 1px solid var(--amber);
  border-radius: 5px;
  color: #161008;
  background: var(--amber);
  font-size: 11px;
  font-weight: 800;
}

.add-inline-button svg {
  width: 13px;
  height: 13px;
}

.icon-button {
  width: 36px;
  border: 1px solid var(--line);
  color: var(--muted);
  background: rgba(255, 255, 255, 0.02);
}

.stats-grid {
  display: grid;
  grid-template-columns: repeat(4, minmax(0, 1fr));
  gap: 10px;
  margin-bottom: 16px;
}

.stat {
  min-height: 92px;
  padding: 14px;
  border: 1px solid var(--line);
  border-radius: var(--radius);
  background: linear-gradient(180deg, rgba(27, 34, 44, 0.86), rgba(21, 26, 34, 0.72));
}

.stat.clickable {
  cursor: pointer;
}

.stat.clickable:hover {
  border-color: rgba(80, 215, 232, 0.56);
  background: linear-gradient(180deg, rgba(30, 41, 52, 0.92), rgba(21, 26, 34, 0.78));
}

.stat span {
  color: var(--muted);
  font-size: 12px;
}

.stat strong {
  display: block;
  margin-top: 10px;
  font-size: 26px;
  line-height: 1;
}

.stat em {
  display: block;
  margin-top: 8px;
  color: var(--quiet);
  font-size: 11px;
  font-style: normal;
}

.board-panel,
.calendar-panel,
.queue-panel,
.detail-panel {
  border: 1px solid var(--line);
  border-radius: var(--radius);
  background: rgba(16, 21, 28, 0.82);
  box-shadow: var(--shadow);
}

.panel-head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  padding: 14px 16px;
  border-bottom: 1px solid var(--line-soft);
}

.panel-head h2,
.panel-head h3 {
  margin: 0;
  font-size: 14px;
}

.panel-head p {
  margin: 3px 0 0;
  color: var(--muted);
  font-size: 12px;
}

.panel-head > svg {
  width: 18px;
  height: 18px;
  color: var(--muted);
  flex: 0 0 auto;
}

.rundown {
  display: grid;
}

.phase-row {
  position: relative;
  display: grid;
  grid-template-columns: 126px 1fr;
  min-height: 108px;
  border-bottom: 1px solid var(--line-soft);
  border-radius: var(--radius);
  overflow: hidden;
  cursor: pointer;
}

.phase-row.active {
  border-bottom-color: var(--amber);
  outline: 1px solid var(--amber);
  outline-offset: -1px;
  box-shadow: inset 0 0 0 1px rgba(240, 180, 93, 0.18), 0 0 18px rgba(240, 180, 93, 0.12);
}

.phase-row.active .phase-label {
  color: var(--amber);
  font-weight: 820;
}

.phase-row.active .phase-label strong {
  color: #ffd58f;
}

.phase-row.active .phase-label span {
  color: rgba(255, 213, 143, 0.78);
}

.phase-row:last-child {
  border-bottom: 0;
}

.phase-label {
  position: relative;
  z-index: 1;
  display: grid;
  grid-template-columns: 16px 1fr;
  align-content: start;
  column-gap: 8px;
  width: 100%;
  padding: 14px 12px 14px 14px;
  border: 0;
  border-right: 0;
  color: var(--text);
  background: transparent;
  text-align: left;
}

.phase-label::before {
  display: none;
}

.phase-row:last-child .phase-label::before {
  display: none;
}

.phase-index {
  display: block;
  width: auto;
  height: auto;
  grid-row: 1 / span 2;
  color: var(--muted);
  background: transparent;
  border-radius: 0;
  font-size: 12px;
  font-weight: 720;
  line-height: 1.2;
}

.phase-label strong {
  display: block;
  font-size: 13px;
  line-height: 1.2;
  white-space: nowrap;
}

.phase-label span {
  display: block;
  margin-top: 5px;
  color: var(--muted);
  font-size: 11px;
}

.phase-work {
  position: relative;
  z-index: 1;
  display: grid;
  grid-template-columns: repeat(3, minmax(0, 1fr));
  align-items: start;
  gap: 8px;
  padding: 10px;
}

.task-card {
  min-height: 0;
  padding: 9px;
  border: 1px solid var(--line);
  border-radius: var(--radius);
  background: rgba(27, 34, 44, 0.66);
  text-align: left;
  cursor: pointer;
}

.task-card.selected {
  border-color: var(--cyan);
  color: #071014;
  background: var(--cyan);
  box-shadow: 0 12px 28px rgba(80, 215, 232, 0.2);
}

.task-card.selected .task-title,
.task-card.selected .task-meta,
.task-card.selected .task-status {
  color: #071014;
}

.task-card.selected .owner-tag {
  border-color: rgba(7, 16, 20, 0.22);
  color: #071014;
  background: rgba(7, 16, 20, 0.08);
}

.task-card.selected .status-dot {
  box-shadow: 0 0 0 3px rgba(7, 16, 20, 0.16);
}

.task-card.selected .task-progress {
  background: rgba(7, 16, 20, 0.18);
}

.task-card.selected .task-progress span {
  background: #071014;
}

.task-card.selected .task-actions {
  border-top-color: rgba(7, 16, 20, 0.16);
}

.task-card.selected .mini-button {
  border-color: rgba(7, 16, 20, 0.24);
  color: #071014;
  background: rgba(7, 16, 20, 0.06);
}

.task-card.selected .mini-button.danger {
  color: #6f1414;
}

.task-card.compact {
  min-height: 118px;
}

.task-top {
  display: flex;
  justify-content: space-between;
  gap: 8px;
  align-items: flex-start;
}

.task-title {
  margin: 0;
  color: var(--text);
  display: -webkit-box;
  overflow: hidden;
  font-size: 12px;
  line-height: 1.25;
  font-weight: 720;
  -webkit-box-orient: vertical;
  -webkit-line-clamp: 2;
}

.status-dot {
  flex: 0 0 auto;
  width: 8px;
  height: 8px;
  margin-top: 2px;
  border-radius: 50%;
  background: #aeb7bd;
}

.task-status {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  flex: 0 0 auto;
  color: var(--muted);
  font-size: 10px;
  line-height: 1;
  white-space: nowrap;
}

.status-dot.done {
  background: var(--green);
}

.status-dot.active {
  background: var(--amber);
}

.status-dot.risk {
  background: var(--red);
}

.status-dot.todo {
  background: #aeb7bd;
}

.task-meta {
  display: flex;
  justify-content: space-between;
  gap: 8px;
  margin-top: 7px;
  color: var(--muted);
  font-size: 10px;
  line-height: 1.2;
}

.task-meta span {
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.owner-tag {
  display: inline-flex;
  align-items: center;
  max-width: 58%;
  min-height: 18px;
  padding: 0 6px;
  border: 1px solid rgba(80, 215, 232, 0.28);
  border-radius: 999px;
  color: var(--cyan);
  background: rgba(80, 215, 232, 0.08);
  font-weight: 760;
}

.task-progress {
  height: 4px;
  margin-top: 7px;
  overflow: hidden;
  border-radius: 20px;
  background: #0d1117;
}

.task-progress span {
  display: block;
  height: 100%;
  border-radius: inherit;
  background: var(--amber);
}

.task-actions,
.detail-actions,
.queue-tools {
  display: flex;
  align-items: center;
  gap: 7px;
  flex-wrap: wrap;
}

.task-actions {
  margin-top: 7px;
  padding-top: 7px;
  border-top: 1px solid var(--line-soft);
}

.task-actions .mini-button {
  min-height: 22px;
  padding: 0 6px;
  font-size: 10px;
}

.task-actions .mini-button svg {
  width: 11px;
  height: 11px;
}

.detail-actions {
  margin-top: 4px;
}

.mini-button,
.mini-icon {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 5px;
  min-height: 28px;
  border: 1px solid var(--line);
  border-radius: 5px;
  color: var(--muted);
  background: rgba(255, 255, 255, 0.02);
  font-size: 11px;
}

.mini-button {
  padding: 0 8px;
}

.mini-icon {
  width: 28px;
  padding: 0;
}

.mini-button svg,
.mini-icon svg {
  width: 13px;
  height: 13px;
  stroke-width: 2;
}

.lower-grid {
  display: grid;
  grid-template-columns: 1fr;
  gap: 12px;
  margin-top: 12px;
}

.inline-inspector {
  display: none;
  margin-top: 12px;
}

.work-grid {
  display: grid;
  grid-template-columns: repeat(4, minmax(0, 1fr));
  gap: 12px;
}

.work-column,
.milestone-panel,
.campaign-panel,
.asset-panel,
.risk-panel,
.review-panel {
  border: 1px solid var(--line);
  border-radius: var(--radius);
  background: rgba(16, 21, 28, 0.82);
  box-shadow: var(--shadow);
}

.work-column {
  min-height: 420px;
  padding: 12px;
}

.column-head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 8px;
}

.column-head h2 {
  margin: 0;
  font-size: 13px;
}

.column-head span {
  display: grid;
  place-items: center;
  min-width: 24px;
  height: 24px;
  border-radius: 50%;
  color: #071014;
  background: var(--cyan);
  font-size: 11px;
  font-weight: 800;
}

.work-column > p {
  margin: 7px 0 12px;
  color: var(--muted);
  font-size: 11px;
}

.column-list {
  display: grid;
  gap: 10px;
}

.acceptance-box {
  margin-top: 10px;
  padding: 9px;
  border: 1px solid var(--line-soft);
  border-radius: 6px;
  color: var(--muted);
  background: rgba(255, 255, 255, 0.03);
  font-size: 11px;
  line-height: 1.35;
}

.milestone-panel {
  margin-top: 12px;
}

.milestone-track {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 1px;
  padding: 12px;
  background: rgba(255, 255, 255, 0.03);
}

.milestone {
  min-height: 96px;
  padding: 12px;
  background: #111720;
}

.milestone span {
  display: grid;
  place-items: center;
  width: 26px;
  height: 26px;
  border-radius: 50%;
  color: var(--muted);
  border: 1px solid var(--line);
  font-size: 11px;
}

.milestone strong {
  display: block;
  margin-top: 12px;
  font-size: 12px;
}

.milestone.done span,
.milestone.active span {
  color: #071014;
  border-color: transparent;
  background: var(--green);
}

.milestone.active span {
  background: var(--cyan);
}

.marketing-layout,
.risk-layout {
  display: grid;
  grid-template-columns: 1.4fr 0.9fr;
  gap: 12px;
  margin-bottom: 12px;
}

.campaign-stages {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 10px;
  padding: 12px;
}

.campaign-stage {
  min-height: 210px;
  padding: 12px;
  border: 1px solid var(--line);
  border-radius: var(--radius);
  background: rgba(27, 34, 44, 0.56);
}

.campaign-stage h3 {
  margin: 0 0 12px;
  font-size: 13px;
}

.campaign-stage.cyan h3 {
  color: var(--cyan);
}

.campaign-stage.amber h3 {
  color: var(--amber);
}

.campaign-stage.green h3 {
  color: var(--green);
}

.stage-action {
  display: block;
  width: 100%;
  min-height: 34px;
  margin-bottom: 8px;
  padding: 0 10px;
  border: 1px solid var(--line);
  border-radius: 6px;
  color: var(--text);
  background: rgba(255, 255, 255, 0.03);
  text-align: left;
  font-size: 12px;
}

.asset-list,
.risk-list,
.review-list {
  display: grid;
  gap: 8px;
  padding: 12px;
}

.asset-row {
  display: grid;
  grid-template-columns: auto 1fr auto;
  align-items: center;
  gap: 10px;
  min-height: 40px;
  padding: 0 10px;
  border: 1px solid var(--line);
  border-radius: 6px;
  background: rgba(255, 255, 255, 0.03);
  font-size: 12px;
}

.asset-row input {
  width: 15px;
  height: 15px;
  accent-color: var(--cyan);
}

.asset-row em {
  color: var(--muted);
  font-size: 11px;
  font-style: normal;
}

.risk-card {
  display: grid;
  grid-template-columns: 1fr auto;
  gap: 12px;
  padding: 12px;
  border: 1px solid var(--line);
  border-radius: var(--radius);
  background: rgba(27, 34, 44, 0.62);
  cursor: pointer;
}

.risk-card.selected {
  border-color: rgba(80, 215, 232, 0.72);
}

.risk-card h3 {
  margin: 8px 0 6px;
  font-size: 13px;
}

.risk-card p {
  margin: 0;
  color: var(--muted);
  font-size: 12px;
  line-height: 1.45;
}

.risk-level {
  display: inline-flex;
  align-items: center;
  min-height: 22px;
  padding: 0 7px;
  border-radius: 5px;
  color: #071014;
  background: var(--amber);
  font-size: 11px;
  font-weight: 800;
}

.risk-level.high {
  color: #fff;
  background: var(--red);
}

.risk-meta {
  display: grid;
  align-content: start;
  gap: 6px;
  color: var(--muted);
  font-size: 11px;
  text-align: right;
}

.review-item {
  padding: 12px;
  border: 1px solid var(--line);
  border-radius: var(--radius);
  background: rgba(255, 255, 255, 0.03);
}

.review-item strong,
.review-item span {
  display: block;
}

.review-item strong {
  font-size: 12px;
}

.review-item span {
  margin-top: 6px;
  color: var(--muted);
  font-size: 11px;
  line-height: 1.4;
}

.empty-state.compact {
  padding: 16px;
}

.calendar-body {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 1px;
  padding: 12px;
  background: rgba(255, 255, 255, 0.03);
}

.day {
  min-height: 86px;
  padding: 8px;
  background: #111720;
}

.day strong {
  display: block;
  color: var(--muted);
  font-size: 11px;
  font-weight: 640;
}

.event {
  margin-top: 8px;
  padding: 7px;
  border-radius: 6px;
  color: #071014;
  background: var(--amber);
  font-size: 11px;
  line-height: 1.25;
}

.event.cyan {
  background: var(--cyan);
}

.event.green {
  background: var(--green);
}

.queue-list {
  display: grid;
  gap: 8px;
  padding: 12px;
}

.queue-item {
  display: grid;
  grid-template-columns: auto 1fr auto;
  align-items: center;
  gap: 10px;
  padding: 10px;
  border: 1px solid var(--line);
  border-radius: var(--radius);
  background: rgba(27, 34, 44, 0.52);
}

.queue-tools {
  grid-column: 2 / -1;
  justify-content: flex-start;
  margin-top: -2px;
}

.queue-item input {
  width: 16px;
  height: 16px;
  accent-color: var(--cyan);
}

.queue-copy strong {
  display: block;
  font-size: 12px;
}

.queue-copy span {
  display: block;
  margin-top: 3px;
  color: var(--muted);
  font-size: 11px;
}

.priority {
  padding: 4px 6px;
  border-radius: 5px;
  color: #071014;
  background: var(--cyan);
  font-size: 10px;
  font-weight: 800;
}

.priority.high {
  background: var(--red);
  color: #fff;
}

.priority.mid {
  background: var(--amber);
}

.inspector {
  padding: 22px 18px;
  border-left: 1px solid var(--line-soft);
  background: rgba(11, 14, 18, 0.88);
}

.detail-panel {
  position: sticky;
  top: 18px;
  overflow: visible;
}

.detail-body {
  padding: 16px;
}

.field {
  margin-bottom: 14px;
}

.field label {
  display: block;
  margin-bottom: 7px;
  color: var(--quiet);
  font-size: 11px;
  font-weight: 780;
  text-transform: uppercase;
}

.field input,
.field select,
.field textarea {
  width: 100%;
  border: 1px solid var(--line);
  border-radius: var(--radius-sm);
  color: var(--text);
  background: #0e1319;
  font-size: 13px;
}

.field input,
.field select {
  height: 38px;
  padding: 0 10px;
}

.field textarea {
  min-height: 88px;
  padding: 10px;
  resize: vertical;
  line-height: 1.45;
}

.status-select {
  position: relative;
}

.status-select select {
  padding-left: 28px;
}

.status-select-dot {
  position: absolute;
  top: 50%;
  left: 10px;
  width: 9px;
  height: 9px;
  border-radius: 50%;
  background: #aeb7bd;
  transform: translateY(-50%);
  pointer-events: none;
}

.status-select-dot.todo {
  background: #aeb7bd;
}

.status-select-dot.active {
  background: var(--amber);
}

.status-select-dot.risk {
  background: var(--red);
}

.status-select-dot.done {
  background: var(--green);
}

.date-picker {
  position: relative;
  overflow: visible;
  border: 1px solid var(--line);
  border-radius: var(--radius-sm);
  background: #0e1319;
}

.date-input-row {
  display: grid;
  grid-template-columns: 38px 1fr;
  align-items: center;
  min-height: 42px;
  border-bottom: 1px solid var(--line);
}

.date-icon {
  display: grid;
  place-items: center;
  height: 100%;
  border: 0;
  border-right: 1px solid var(--line);
  color: var(--muted);
  background: transparent;
}

.date-icon svg {
  width: 17px;
  height: 17px;
}

.date-input-row input {
  width: 100%;
  height: 42px;
  border: 0;
  color: var(--text);
  background: transparent;
  padding: 0 12px;
  font-size: 13px;
}

.date-input-row input:focus {
  outline: 1px solid var(--cyan-2);
  outline-offset: -1px;
}

.calendar-popover {
  position: absolute;
  z-index: 20;
  top: calc(100% + 6px);
  right: 0;
  width: min(268px, calc(100vw - 32px));
  border: 1px solid var(--line);
  border-radius: var(--radius);
  overflow: hidden;
  box-shadow: var(--shadow);
  background: #121820;
}

.calendar-month {
  display: grid;
  grid-template-columns: 28px 1fr 28px;
  align-items: center;
  min-height: 36px;
  border-bottom: 1px solid var(--line);
  background: #151b23;
}

.calendar-month strong,
.calendar-title {
  text-align: center;
  font-size: 13px;
}

.calendar-title {
  display: flex;
  justify-content: center;
  gap: 5px;
}

.calendar-title button,
.picker-head button {
  min-height: 24px;
  border: 0;
  border-radius: 5px;
  color: var(--text);
  background: rgba(255, 255, 255, 0.04);
  font-size: 12px;
  font-weight: 760;
}

.calendar-nav {
  display: grid;
  place-items: center;
  height: 28px;
  border: 0;
  color: var(--text);
  background: transparent;
}

.calendar-nav svg {
  width: 15px;
  height: 15px;
}

.calendar-weekdays,
.calendar-grid {
  display: grid;
  grid-template-columns: repeat(7, minmax(0, 1fr));
}

.calendar-weekdays {
  min-height: 26px;
  align-items: center;
  border-bottom: 1px solid var(--line);
  color: var(--muted);
  background: #10161d;
  font-size: 10px;
  font-weight: 720;
  text-align: center;
}

.calendar-day {
  min-height: 28px;
  border: 0;
  color: var(--text);
  background: #121820;
  font-size: 11px;
  font-weight: 680;
}

.calendar-day.muted {
  color: var(--quiet);
  background: #192029;
}

.calendar-day.selected {
  color: #071014;
  background: var(--cyan-2);
}

.calendar-day:hover {
  color: #071014;
  background: var(--cyan);
}

.calendar-day:disabled {
  color: #39434d;
  background: #10161d;
  cursor: not-allowed;
}

.picker-head {
  display: flex;
  justify-content: center;
  padding: 6px;
}

.year-grid,
.month-grid {
  display: grid;
  gap: 5px;
  padding: 10px;
  max-height: 188px;
  overflow: auto;
}

.year-grid {
  grid-template-columns: repeat(4, minmax(0, 1fr));
}

.month-grid {
  grid-template-columns: repeat(3, minmax(0, 1fr));
}

.year-grid button,
.month-grid button {
  min-height: 28px;
  border: 1px solid var(--line);
  border-radius: 6px;
  color: var(--text);
  background: rgba(255, 255, 255, 0.03);
  font-size: 11px;
}

.year-grid button.selected,
.month-grid button.selected {
  color: #071014;
  border-color: var(--cyan);
  background: var(--cyan);
  font-weight: 800;
}

.range-row {
  display: grid;
  grid-template-columns: minmax(0, 1fr) 54px;
  align-items: center;
  gap: 10px;
}

.range-row input {
  accent-color: var(--cyan);
}

.range-row output {
  color: var(--cyan);
  font-size: 12px;
  font-weight: 780;
  text-align: right;
  white-space: nowrap;
}

.progress-steps {
  display: grid;
  grid-template-columns: repeat(5, minmax(0, 1fr));
  gap: 4px;
}

.progress-step {
  min-height: 18px;
  border: 1px solid var(--line);
  border-radius: 999px;
  color: rgba(7, 16, 20, 0.74);
  background: rgba(255, 255, 255, 0.03);
  font-size: 10px;
  font-weight: 800;
  padding: 0 4px;
}

.progress-step.step-1.active {
  background: #eefbed;
  border-color: #eefbed;
}

.progress-step.step-2.active {
  background: #d9f7d7;
  border-color: #d9f7d7;
}

.progress-step.step-3.active {
  background: #a8ecaa;
  border-color: #a8ecaa;
}

.progress-step.step-4.active {
  background: #72dc80;
  border-color: #72dc80;
}

.progress-step.step-5.active {
  background: #35c765;
  border-color: #35c765;
}

.progress-step:not(.active) {
  color: var(--muted);
}

.inline-fields {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}

.save-state {
  margin-top: 10px;
  color: var(--green);
  font-size: 12px;
  min-height: 18px;
}

.empty-state {
  padding: 24px;
  color: var(--muted);
  text-align: center;
  font-size: 13px;
}

.modal-backdrop {
  position: fixed;
  inset: 0;
  z-index: 50;
  display: grid;
  place-items: center;
  padding: 20px;
  background: rgba(5, 7, 10, 0.72);
  backdrop-filter: blur(8px);
}

.project-modal {
  width: min(720px, 100%);
  max-height: min(760px, calc(100vh - 40px));
  display: grid;
  grid-template-rows: auto minmax(0, 1fr) auto;
  border: 1px solid var(--line);
  border-radius: var(--radius);
  overflow: hidden;
  background: #111720;
  box-shadow: var(--shadow);
}

.modal-head,
.modal-actions,
.modal-section-head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
}

.modal-head {
  padding: 16px;
  border-bottom: 1px solid var(--line);
  background: rgba(255, 255, 255, 0.02);
}

.modal-head h2,
.modal-section-head h3 {
  margin: 0;
}

.modal-head h2 {
  font-size: 18px;
}

.modal-head p,
.modal-section-head p {
  margin: 4px 0 0;
  color: var(--muted);
  font-size: 12px;
}

.modal-body {
  padding: 16px;
  overflow: auto;
}

.modal-section-head {
  margin: 6px 0 10px;
}

.modal-section-head h3 {
  font-size: 13px;
}

.draft-stage-list {
  display: grid;
  gap: 8px;
}

.draft-stage {
  display: grid;
  grid-template-columns: 24px minmax(110px, 0.8fr) minmax(150px, 1.2fr) 28px;
  align-items: center;
  gap: 8px;
  padding: 8px;
  border: 1px solid var(--line);
  border-radius: var(--radius-sm);
  background: rgba(255, 255, 255, 0.025);
}

.draft-stage-index {
  color: var(--amber);
  font-size: 12px;
  font-weight: 820;
  text-align: center;
}

.draft-stage input {
  width: 100%;
  height: 32px;
  border: 1px solid var(--line);
  border-radius: 5px;
  color: var(--text);
  background: #0e1319;
  padding: 0 8px;
  font-size: 12px;
}

.modal-actions {
  padding: 12px 16px;
  border-top: 1px solid var(--line);
  justify-content: flex-end;
  background: rgba(255, 255, 255, 0.02);
}

@media (max-width: 1180px) {
  .layout {
    grid-template-columns: 86px minmax(0, 1fr);
  }

  .sidebar {
    padding: 18px 10px;
  }

  .brand-copy,
  .nav span,
  .product-scope,
  .project-card,
  .sidebar-section .section-title {
    display: none;
  }

  .nav button {
    justify-content: center;
    padding: 0;
  }

  .inspector {
    display: none;
  }

  .inline-inspector {
    display: block;
  }

  .detail-panel {
    position: static;
  }

  .work-grid {
    grid-template-columns: repeat(2, minmax(0, 1fr));
  }

  .marketing-layout,
  .risk-layout {
    grid-template-columns: 1fr;
  }
}

@media (max-width: 820px) {
  .layout {
    display: block;
  }

  .sidebar {
    position: sticky;
    top: 0;
    z-index: 5;
    display: flex;
    align-items: center;
    gap: 12px;
    overflow-x: auto;
    border-right: 0;
    border-bottom: 1px solid var(--line-soft);
  }

  .brand {
    margin-bottom: 0;
  }

  .nav {
    display: flex;
    margin-bottom: 0;
  }

  .nav span {
    display: inline;
  }

  .nav button {
    justify-content: flex-start;
    width: auto;
    min-width: max-content;
    padding: 0 10px;
  }

  .main,
  .inspector {
    padding: 16px;
  }

  .topbar {
    align-items: flex-start;
    flex-direction: column;
  }

  .lower-grid,
  .phase-work,
  .work-grid,
  .campaign-stages,
  .milestone-track {
    grid-template-columns: 1fr;
  }

  .stats-grid {
    grid-template-columns: repeat(4, minmax(0, 1fr));
    gap: 6px;
    margin-bottom: 12px;
  }

  .stat {
    min-height: 74px;
    padding: 8px 6px;
  }

  .stat span {
    font-size: 10px;
    white-space: nowrap;
  }

  .stat strong {
    margin-top: 7px;
    font-size: 18px;
  }

  .stat em {
    margin-top: 6px;
    font-size: 9px;
    line-height: 1.2;
  }

  .work-column {
    min-height: auto;
  }

  .phase-row {
    grid-template-columns: 1fr;
  }

  .phase-label {
    border-right: 0;
    border-bottom: 1px solid var(--line-soft);
  }

  .phase-label::before {
    display: none;
  }

  .calendar-body {
    grid-template-columns: 1fr;
  }

function loadState() {
  try {
    const saved = localStorage.getItem("product-rundown-state");
    return normalizeState(saved ? JSON.parse(saved) : structuredClone(seed));
  } catch {
    return normalizeState(structuredClone(seed));

function normalizeState(nextState) {
  if (!["overview", "delivery", "marketing", "risk"].includes(nextState.activePage)) {
    nextState.activePage = "overview";
  }
  if (!phases.includes(nextState.activePhase)) {
    nextState.activePhase = "洞察";
  }
  if (!Array.isArray(nextState.projects) || !nextState.projects.length) {
    nextState.projects = structuredClone(seed.projects);
  }
  if (!nextState.selectedProjectId || !nextState.projects.some((project) => project.id === nextState.selectedProjectId)) {
    nextState.selectedProjectId = nextState.projects[0].id;
  }
  if (!nextState.expandedProjectId || !nextState.projects.some((project) => project.id === nextState.expandedProjectId)) {
    nextState.expandedProjectId = nextState.selectedProjectId;
  }
  nextState.projects = nextState.projects.map((project) => ({
    owner: "Founder",
    due: "06/28",
    urgency: "yellow",
    note: "把产品开发、落地执行和营销节奏放进同一个推进面板。",
    members: [],
    stages: null,
    ...project
  }));
  const activeProject = nextState.projects.find((project) => project.id === nextState.selectedProjectId) || nextState.projects[0];
  const activeStages = stageNames(activeProject);
  if (!activeStages.includes(nextState.activePhase)) {
    nextState.activePhase = activeStages[0] || "立项";
  }
  return nextState;
}

function persist(message = "已自动保存") {

    notices.forEach((el) => {
      el.textContent = message;
    });
    clearTimeout(saveTimer);
    saveTimer = setTimeout(() => {
      notices.forEach((el) => {
        el.textContent = "";
      });
    }, 1800);
  }
}

function normalizeStages(stages, fallback = legacyStages) {
  const source = Array.isArray(stages) && stages.length ? stages : fallback;
  return source
    .map((stage) => {
      if (typeof stage === "string") return { name: stage.trim(), hint: "" };
      return { name: String(stage?.name || "").trim(), hint: String(stage?.hint || "").trim() };
    })
    .filter((stage) => stage.name);
}

function currentStages() {
  return normalizeStages(currentProject()?.stages);
}

function stageNames(project = currentProject()) {
  return normalizeStages(project?.stages).map((stage) => stage.name);
}

function viewTasks() {
  return sortTasks(state.tasks.filter((task) => isTaskInView(task)));
}

function taskProgress(tasks) {
  return tasks.length ? Math.round(tasks.reduce((sum, task) => sum + Number(task.progress || 0), 0) / tasks.length) : 0;
}

function sortTasks(tasks) {
  return [...tasks].sort((a, b) => {
    const dateA = parseDueDate(a.due)?.getTime() ?? Number.MAX_SAFE_INTEGER;
    const dateB = parseDueDate(b.due)?.getTime() ?? Number.MAX_SAFE_INTEGER;
    if (dateA !== dateB) return dateA - dateB;
    return String(a.title).localeCompare(String(b.title), "zh-Hans-CN");
  });
}

function isTaskInView(task) {
  if (state.view === "month") return isDueInRange(task.due, startOfMonth(new Date()), endOfMonth(new Date()));
  if (state.view === "week") return isDueInRange(task.due, startOfWeek(new Date()), endOfWeek(new Date()));
  return isDueInRange(task.due, startOfDay(new Date()), endOfDay(new Date()));
}

function parseDueDate(value) {
  const text = String(value || "");
  const iso = text.match(/^(\d{4})-(\d{2})-(\d{2})$/);
  if (iso) return new Date(Number(iso[1]), Number(iso[2]) - 1, Number(iso[3]));
  const fullSlash = text.match(/^(\d{4})\/(\d{1,2})\/(\d{1,2})$/);
  if (fullSlash) return new Date(Number(fullSlash[1]), Number(fullSlash[2]) - 1, Number(fullSlash[3]));
  const short = text.match(/^(\d{1,2})\/(\d{1,2})$/);
  if (!short) return null;
  return new Date(new Date().getFullYear(), Number(short[1]) - 1, Number(short[2]));
}

function toDateInputValue(value) {
  const due = parseDueDate(value);
  if (!due) return "";
  return `${due.getFullYear()}-${String(due.getMonth() + 1).padStart(2, "0")}-${String(due.getDate()).padStart(2, "0")}`;
}

function displayDue(value) {
  const due = parseDueDate(value);
  if (!due) return String(value || "未定");
  return `${due.getFullYear()}/${String(due.getMonth() + 1).padStart(2, "0")}/${String(due.getDate()).padStart(2, "0")}`;
}

function monthLabel(date) {
  return `${date.getFullYear()}年 ${date.getMonth() + 1}月`;
}

function dateKey(date) {
  return `${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, "0")}-${String(date.getDate()).padStart(2, "0")}`;
}

function isDueInRange(value, start, end) {
  const due = parseDueDate(value);
  if (!due) return false;
  return due >= start && due <= end;
}

function startOfDay(date) {
  return new Date(date.getFullYear(), date.getMonth(), date.getDate());
}

function endOfDay(date) {
  return new Date(date.getFullYear(), date.getMonth(), date.getDate(), 23, 59, 59, 999);
}

function startOfWeek(date) {
  const day = date.getDay() || 7;
  return new Date(date.getFullYear(), date.getMonth(), date.getDate() - day + 1);
}

function endOfWeek(date) {
  const start = startOfWeek(date);
  return new Date(start.getFullYear(), start.getMonth(), start.getDate() + 6, 23, 59, 59, 999);
}

function startOfMonth(date) {
  return new Date(date.getFullYear(), date.getMonth(), 1);
}

function endOfMonth(date) {
  return new Date(date.getFullYear(), date.getMonth() + 1, 0, 23, 59, 59, 999);
}

function calendarPanel(selected, view) {
  if (calendarMode === "year") return yearPanel(view);
  if (calendarMode === "month") return monthPanel(view);
  const first = new Date(view.getFullYear(), view.getMonth(), 1);
  const gridStart = new Date(first);
  gridStart.setDate(first.getDate() - first.getDay());
  const cells = Array.from({ length: 42 }, (_, index) => {
    const date = new Date(gridStart);
    date.setDate(gridStart.getDate() + index);
    const inMonth = date.getMonth() === view.getMonth();
    const isSelected = dateKey(date) === dateKey(selected);
    const disabled = !isCalendarDateAllowed(date);
    return `
      <button class="calendar-day ${inMonth ? "" : "muted"} ${isSelected ? "selected" : ""}" data-date="${dateKey(date)}" ${disabled ? "disabled" : ""}>
        ${date.getDate()}
      </button>
    `;
  }).join("");

  return `
    <div class="calendar-popover">
      <div class="calendar-month">
        <button class="calendar-nav" data-calendar-prev>${icon.chevronLeft || "‹"}</button>
        <div class="calendar-title">
          <button data-calendar-mode="year">${view.getFullYear()}年</button>
          <button data-calendar-mode="month">${view.getMonth() + 1}月</button>
        </div>
        <button class="calendar-nav" data-calendar-next>${icon.chevronRight || "›"}</button>
      </div>
      <div class="calendar-weekdays">
        ${["周日", "周一", "周二", "周三", "周四", "周五", "周六"].map((day) => `<span>${day}</span>`).join("")}
      </div>
      <div class="calendar-grid">${cells}</div>
    </div>
  `;
}

function yearPanel(view) {
  const years = Array.from({ length: 75 }, (_, index) => 2025 + index);
  return `
    <div class="calendar-popover">
      <div class="calendar-month picker-head">
        <strong>选择年份</strong>
      </div>
      <div class="year-grid">
        ${years.map((year) => `<button class="${year === view.getFullYear() ? "selected" : ""}" data-year="${year}">${year}</button>`).join("")}
      </div>
    </div>
  `;
}

function monthPanel(view) {
  return `
    <div class="calendar-popover">
      <div class="calendar-month picker-head">
        <button data-calendar-mode="year">${view.getFullYear()}年</button>
      </div>
      <div class="month-grid">
        ${Array.from({ length: 12 }, (_, index) => `<button class="${index === view.getMonth() ? "selected" : ""}" data-month="${index}">${index + 1}月</button>`).join("")}
      </div>

}

function pageStats(page, metrics) {
  const scopedTasks = viewTasks();
  const total = scopedTasks.length;
  const active = scopedTasks.filter((task) => task.status === "active").length;
  const blocked = scopedTasks.filter((task) => task.status === "risk").length;
  const marketingCount = scopedTasks.filter((task) => ["上线", "增长"].includes(task.phase)).length;
  const doneActions = state.actions.filter((action) => action.done).length;
  const highActions = state.actions.filter((action) => action.priority === "high" && !action.done).length;
  const highRisks = scopedTasks.filter((task) => task.risk === "高").length;
  return {
    overview: [
      { label: "整体进度", value: `${metrics.avg}%`, caption: "按全部任务进度估算" },
      { label: "已完成任务", value: `${metrics.done}/${total}`, caption: "完成后进入复盘池" },
      { label: "风险点", value: `${metrics.risk}`, caption: "点击查看风险位置", target: "risk" },
      { label: "上线相关", value: `${metrics.launchTasks}`, caption: "点击跳到上线阶段", target: "launch" }
    ],
    delivery: [
      { label: "开发进度", value: `${metrics.avg}%`, caption: "任务完成率估算" },
      { label: "进行中", value: `${active}`, caption: "正在推进的执行项" },
      { label: "待验收", value: `${metrics.done}`, caption: "可进入复盘或验收" },
      { label: "阻塞", value: `${blocked}`, caption: "需要协调处理" }
    ],
    marketing: [
      { label: "营销动作", value: `${marketingCount}`, caption: "上线与增长阶段任务" },
      { label: "发布前", value: "3", caption: "预热、邀约、素材" },
      { label: "发布后", value: "4", caption: "复盘、追踪、二次触达" },
      { label: "已完成行动", value: `${doneActions}/${state.actions.length}`, caption: "下一步队列完成度" }
    ],
    risk: [
      { label: "风险总数", value: `${blocked}`, caption: "状态为有风险" },
      { label: "高风险", value: `${highRisks}`, caption: "风险等级为高" },
      { label: "待处理优先项", value: `${highActions}`, caption: "高优先级未完成" },
      { label: "复盘闭环", value: `${metrics.done}`, caption: "可沉淀经验的任务" }
    ]
  }[page];
}

function bindEvents() {
  document.querySelectorAll("[data-page]").forEach((button) => {
    button.addEventListener("click", () => {
      state.activePage = button.dataset.page;
      pendingDeleteId = null;
      pendingActionDeleteId = null;
      pendingProjectDeleteId = null;
      persist("已切换页面");
      app();
    });
  });

  document.querySelectorAll("[data-stat-target]").forEach((card) => {
    card.addEventListener("click", () => {
      jumpToStatTarget(card.dataset.statTarget);
    });
  });

  document.querySelector("[data-project-note]")?.addEventListener("input", (event) => {
    const project = currentProject();
    project.note = event.target.value;
    persist("已保存备注");
  });

  document.querySelector("[data-add-member]")?.addEventListener("click", () => {
    addProjectMember();
  });

  document.querySelectorAll("[data-member]").forEach((button) => {
    button.addEventListener("click", () => {
      pendingMemberName = pendingMemberName === button.dataset.member ? null : button.dataset.member;
      app();
    });
  });

  document.querySelectorAll("[data-delete-member]").forEach((button) => {
    button.addEventListener("click", (event) => {
      event.stopPropagation();
      deleteProjectMember(button.dataset.deleteMember);
    });
  });

  document.querySelectorAll("[data-select]").forEach((card) => {
    card.addEventListener("click", (event) => {
      if (event.target.closest("button")) return;
      state.selectedId = card.dataset.select;
      const task = state.tasks.find((item) => item.id === card.dataset.select);
      if (task) state.activePhase = task.phase;
      app();
    });
  });

  document.querySelectorAll("[data-view]").forEach((button) => {
    button.addEventListener("click", () => {
      state.view = button.dataset.view;
      persist();
      app();
    });
  });

  document.querySelectorAll("[data-filter]").forEach((button) => {
    button.addEventListener("click", () => {
      state.filter = button.dataset.filter;
      pendingDeleteId = null;
      persist();
      app();
    });
  });

  document.querySelectorAll("[data-phase-select]").forEach((button) => {
    button.addEventListener("click", (event) => {
      event.stopPropagation();
      state.activePhase = button.dataset.phaseSelect;
      persist("已选中阶段");
      app();
    });
  });

  document.querySelectorAll("[data-phase]").forEach((row) => {
    row.addEventListener("click", (event) => {
      if (event.target.closest("[data-copy-task], [data-delete-task]")) return;
      state.activePhase = row.dataset.phase;
      persist("已选中阶段");
      app();
    });
  });

  document.querySelector("[data-add-task]")?.addEventListener("click", () => {
    const id = `t${Date.now()}`;
    state.tasks.push({
      id,
      phase: state.activePhase || stageNames()[0] || "立项",
      title: "新的产品推进动作",
      owner: currentProject().members[0] || "",
      due: defaultDueForView(),
      status: "todo",
      progress: 0,
      note: "写下这个动作为什么重要，以及完成标准。",
      risk: "中"
    });
    state.selectedId = id;
    pendingDeleteId = null;
    persist("已新增行动");
    app();
  });

  document.querySelector("[data-add-project]")?.addEventListener("click", () => {
    addProject();
  });

  document.querySelectorAll("[data-close-project-modal]").forEach((button) => {
    button.addEventListener("click", () => {
      projectModalOpen = false;
      projectDraft = null;
      editingProjectId = null;
      app();
    });
  });

  document.querySelectorAll("[data-project-draft]").forEach((field) => {
    field.addEventListener("input", () => {
      if (!projectDraft) projectDraft = createProjectDraft();
      projectDraft[field.dataset.projectDraft] = field.value;
    });
  });

  document.querySelectorAll("[data-draft-stage-name]").forEach((field) => {
    field.addEventListener("input", () => {
      if (!projectDraft) projectDraft = createProjectDraft();
      const stage = projectDraft.stages[Number(field.dataset.draftStageName)];
      if (stage) stage.name = field.value;
    });
  });

  document.querySelectorAll("[data-draft-stage-hint]").forEach((field) => {
    field.addEventListener("input", () => {
      if (!projectDraft) projectDraft = createProjectDraft();
      const stage = projectDraft.stages[Number(field.dataset.draftStageHint)];
      if (stage) stage.hint = field.value;
    });
  });

  document.querySelector("[data-add-draft-stage]")?.addEventListener("click", () => {
    if (!projectDraft) projectDraft = createProjectDraft();
    projectDraft.stages.push({ name: "新阶段", hint: "目标、动作、交付" });
    app();
  });

  document.querySelectorAll("[data-delete-draft-stage]").forEach((button) => {
    button.addEventListener("click", () => {
      if (!projectDraft) projectDraft = createProjectDraft();
      if (projectDraft.stages.length <= 1) {
        persist("至少保留一个阶段");
        return;
      }
      projectDraft.stages.splice(Number(button.dataset.deleteDraftStage), 1);
      app();
    });
  });

  document.querySelector("[data-save-project-draft]")?.addEventListener("click", () => {
    saveProjectDraft();
  });

  document.querySelectorAll("[data-open-project]").forEach((button) => {
    button.addEventListener("click", () => {
      state.selectedProjectId = button.dataset.openProject;
      state.expandedProjectId = state.expandedProjectId === button.dataset.openProject ? "" : button.dataset.openProject;
      const nextProject = currentProject();
      state.activePhase = stageNames(nextProject)[0] || state.activePhase;
      pendingProjectDeleteId = null;
      persist("已切换产品");
      app();
    });
  });

  document.querySelectorAll("[data-edit-project]").forEach((button) => {
    button.addEventListener("click", () => {
      editProject(button.dataset.editProject);
    });
  });

  document.querySelectorAll("[data-copy-project]").forEach((button) => {
    button.addEventListener("click", () => {
      duplicateProject(button.dataset.copyProject);
    });
  });

  document.querySelectorAll("[data-delete-project]").forEach((button) => {
    button.addEventListener("click", () => {
      deleteProject(button.dataset.deleteProject);
    });
  });

  document.querySelectorAll("[data-confirm-delete-project]").forEach((button) => {
    button.addEventListener("click", () => {
      deleteProject(button.dataset.confirmDeleteProject, true);
    });
  });

  document.querySelector("[data-export-tasks]")?.addEventListener("click", () => {
    exportAllTasks();
  });

  document.querySelector("[data-import-data]")?.addEventListener("change", (event) => {
    importAllData(event.target.files?.[0]);
    event.target.value = "";
  });

  document.querySelectorAll("[data-urgency]").forEach((button) => {
    button.addEventListener("click", () => {
      const [id, urgency] = button.dataset.urgency.split(":");
      setProjectUrgency(id, urgency);
    });
  });

  document.querySelectorAll("[data-field]").forEach((field) => {
    field.addEventListener("input", () => updateTaskField(field));
    field.addEventListener("change", () => updateTaskField(field));
  });

  document.querySelectorAll("[data-date-text]").forEach((input) => {
    input.addEventListener("change", (event) => {
      const task = selectedTask();
      const due = parseDueDate(event.target.value);
      if (!task || !due || !isCalendarDateAllowed(due)) {
        app();
        return;
      }
      task.due = formatDueDate(due);
      calendarViewDate = new Date(due.getFullYear(), due.getMonth(), 1);
      calendarOpen = false;
      calendarMode = "day";
      persist("已更新截止日期");
      app();
    });
  });

  document.querySelectorAll("[data-calendar-toggle]").forEach((trigger) => {
    trigger.addEventListener("click", () => {
      const task = selectedTask();
      const due = parseDueDate(task?.due) || new Date();
      calendarViewDate = calendarViewDate || new Date(due.getFullYear(), due.getMonth(), 1);
      calendarOpen = !calendarOpen;
      calendarMode = "day";
      app();
    });
  });

  document.querySelectorAll("[data-calendar-prev]").forEach((button) => {
    button.addEventListener("click", () => {
      moveCalendarMonth(-1);
    });
  });

  document.querySelectorAll("[data-calendar-next]").forEach((button) => {
    button.addEventListener("click", () => {
      moveCalendarMonth(1);
    });
  });

  document.querySelectorAll("[data-date]").forEach((button) => {
    button.addEventListener("click", () => {
      const due = parseDueDate(button.dataset.date);
      const task = selectedTask();
      if (!task || !due || !isCalendarDateAllowed(due)) return;
      task.due = formatDueDate(due);
      calendarViewDate = new Date(due.getFullYear(), due.getMonth(), 1);
      calendarOpen = false;
      calendarMode = "day";
      persist("已更新截止日期");
      app();
    });
  });

  document.querySelectorAll("[data-calendar-mode]").forEach((button) => {
    button.addEventListener("click", () => {
      calendarOpen = true;
      calendarMode = button.dataset.calendarMode;
      app();
    });
  });

  document.querySelectorAll("[data-year]").forEach((button) => {
    button.addEventListener("click", () => {
      const base = calendarViewDate || parseDueDate(selectedTask()?.due) || new Date();
      calendarViewDate = new Date(Number(button.dataset.year), base.getMonth(), 1);
      calendarMode = "month";
      calendarOpen = true;
      app();
    });
  });

  document.querySelectorAll("[data-month]").forEach((button) => {
    button.addEventListener("click", () => {
      const base = calendarViewDate || parseDueDate(selectedTask()?.due) || new Date();
      calendarViewDate = new Date(base.getFullYear(), Number(button.dataset.month), 1);
      calendarMode = "day";
      calendarOpen = true;
      app();
    });
  });

  document.querySelectorAll("[data-progress]").forEach((button) => {
    button.addEventListener("click", () => {
      const task = selectedTask();
      if (!task) return;
      task.progress = Number(button.dataset.progress);
      persist("已更新进度");
      app();
    });
  });

  document.querySelectorAll("[data-action]").forEach((checkbox) => {
    checkbox.addEventListener("change", () => {
      const item = state.actions.find((action) => action.id === checkbox.dataset.action);
      if (item) item.done = checkbox.checked;
      persist();
      app();
    });
  });

  document.querySelectorAll("[data-copy-task]").forEach((button) => {
    button.addEventListener("click", () => {
      duplicateTask(button.dataset.copyTask);
    });
  });

  document.querySelectorAll("[data-delete-task]").forEach((button) => {
    button.addEventListener("click", () => {
      deleteTask(button.dataset.deleteTask);
    });
  });

  document.querySelectorAll("[data-copy-action]").forEach((button) => {
    button.addEventListener("click", (event) => {
      event.preventDefault();
      duplicateAction(button.dataset.copyAction);
    });
  });

  document.querySelectorAll("[data-delete-action]").forEach((button) => {
    button.addEventListener("click", (event) => {
      event.preventDefault();
      deleteAction(button.dataset.deleteAction);
    });
  });

  document.querySelectorAll("[data-mark-done]").forEach((button) => {
    button.addEventListener("click", () => {
      const task = selectedTask();
      if (task.status === "done") {
        task.status = "active";
        persist("已取消完成");
      } else {
        task.status = "done";
        task.progress = 100;
        persist("已标记完成");
      }
      app();
    });
  });

  document.querySelectorAll("[data-save]").forEach((button) => {
    button.addEventListener("click", () => persist("已保存"));
  });
}

function addProjectMember() {
  const name = window.prompt("录入项目人员姓名");
  if (!name || !name.trim()) return;
  const project = currentProject();
  project.members = Array.isArray(project.members) ? project.members : [];
  if (!project.members.includes(name.trim())) project.members.push(name.trim());
  pendingMemberName = null;
  persist("已添加项目人员");
  app();
}

function deleteProjectMember(name) {
  const project = currentProject();
  project.members = (project.members || []).filter((member) => member !== name);
  state.tasks.forEach((task) => {
    if (task.owner === name) task.owner = project.members[0] || "";
  });
  pendingMemberName = null;
  persist("已删除项目人员");
  app();
}

function jumpToStatTarget(target) {
  if (target === "risk") {
    state.activePage = "risk";
    pendingDeleteId = null;
    pendingActionDeleteId = null;
    pendingProjectDeleteId = null;
    persist("已跳到风险复盘");
    app();
    return;
  }
  if (target === "launch") {
    state.activePage = "overview";
    state.filter = "all";
    const launchPhase = stageNames().includes("上线") ? "上线" : stageNames().includes("上市") ? "上市" : state.activePhase;
    state.activePhase = launchPhase;
    persist("已跳到上线阶段");
    app();
    window.setTimeout(() => {
      document.querySelector(`[data-phase="${launchPhase}"]`)?.scrollIntoView({ behavior: "smooth", block: "center" });
    }, 0);
  }
}

function moveCalendarMonth(delta) {
  const task = selectedTask();
  const base = calendarViewDate || parseDueDate(task?.due) || new Date();
  const next = new Date(base.getFullYear(), base.getMonth() + delta, 1);
  const min = new Date(2025, 0, 1);
  const max = new Date(2099, 11, 1);
  if (next < min || next > max) return;
  calendarViewDate = next;
  app();
}

function isCalendarDateAllowed(date) {
  return date >= new Date(2025, 0, 1) && date <= new Date(2099, 11, 31);
}

function defaultDueForView() {
  const now = new Date();
  if (state.view === "week") return formatDueDate(endOfWeek(now));
  if (state.view === "month") return formatDueDate(endOfMonth(now));
  return formatDueDate(now);
}

function formatDueDate(date) {
  return `${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, "0")}-${String(date.getDate()).padStart(2, "0")}`;
}

function updateTaskField(field) {
  const task = selectedTask();
  if (!task) return;
  const key = field.dataset.field;
  task[key] = key === "progress" ? Number(field.value) : field.value;
  if (key === "phase") {
    state.activePhase = field.value;
    persist("已移动到对应阶段");
    app();
    return;
  }
  if (["owner", "status", "title", "due"].includes(key)) {
    persist("已同步任务卡");
    app();
    return;
  }
  persist();
}

function addProject() {
  projectDraft = createProjectDraft();
  editingProjectId = null;
  projectModalOpen = true;
  app();
}

function saveProjectDraft() {
  if (!projectDraft) projectDraft = createProjectDraft();
  const stages = normalizeStages(projectDraft.stages, odmDefaultStages);
  if (editingProjectId) {
    const project = state.projects.find((item) => item.id === editingProjectId);
    if (!project) return;
    const oldStageNames = stageNames(project);
    project.name = projectDraft.name.trim() || project.name;
    project.note = projectDraft.note.trim() || project.note;
    project.stages = stages;
    state.tasks.forEach((task) => {
      const index = oldStageNames.indexOf(task.phase);
      if (index >= 0 && stages[index]) task.phase = stages[index].name;
    });
    if (!stageNames(project).includes(state.activePhase)) {
      state.activePhase = stages[0]?.name || state.activePhase;
    }
    projectModalOpen = false;
    projectDraft = null;
    editingProjectId = null;
    persist("已保存产品");
    app();
    return;
  }
  const id = `p${Date.now()}`;
  const firstStage = stages[0]?.name || "立项";
  state.projects.push({
    id,
    name: projectDraft.name.trim() || "新 ODM 产品",
    owner: "Founder",
    due: "待定",
    urgency: "yellow",
    note: projectDraft.note.trim() || "从设计、打样、量产、出货到上市的 ODM 产品推进面板。",
    members: [],
    stages
  });
  state.selectedProjectId = id;
  state.expandedProjectId = id;
  state.activePhase = firstStage;
  pendingProjectDeleteId = null;
  projectModalOpen = false;
  projectDraft = null;
  editingProjectId = null;
  persist("已创建产品");
  app();
}

function editProject(id) {
  const project = state.projects.find((item) => item.id === id);
  if (!project) return;
  projectDraft = {
    name: project.name,
    note: project.note || "",
    stages: structuredClone(normalizeStages(project.stages))
  };
  editingProjectId = id;
  projectModalOpen = true;
  pendingProjectDeleteId = null;
  app();
}

function duplicateProject(id) {
  const source = state.projects.find((project) => project.id === id);
  if (!source) return;
  const copy = {
    ...source,
    id: `p${Date.now()}`,
    name: `${source.name} 副本`,
    members: structuredClone(source.members || []),
    stages: structuredClone(source.stages || null)
  };
  const index = state.projects.findIndex((project) => project.id === id);
  state.projects.splice(index + 1, 0, copy);
  state.selectedProjectId = copy.id;
  state.expandedProjectId = copy.id;
  pendingProjectDeleteId = null;
  persist("已复制产品");
  app();
}

function deleteProject(id, confirmed = false) {
  if (state.projects.length <= 1) {
    persist("至少保留一个产品");
    return;
  }
  if (!confirmed) {
    pendingProjectDeleteId = id;
    pendingDeleteId = null;
    pendingActionDeleteId = null;
    app();
    return;
  }
  if (pendingProjectDeleteId !== id) return;
  const index = state.projects.findIndex((project) => project.id === id);
  if (index === -1) return;
  state.projects.splice(index, 1);
  const nextProject = state.projects[Math.max(0, index - 1)] || state.projects[0];
  state.selectedProjectId = nextProject.id;
  state.expandedProjectId = nextProject.id;
  state.activePhase = stageNames(nextProject)[0] || state.activePhase;
  pendingProjectDeleteId = null;
  persist("已删除产品");
  app();
}

function setProjectUrgency(id, urgency) {
  const project = state.projects.find((item) => item.id === id);
  if (!project) return;
  project.urgency = urgency;
  pendingProjectDeleteId = null;
  persist(`已标记为${urgencyLabel(urgency)}`);
  app();
}

function downloadJson(filename, data) {
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: "application/json" });
  const url = URL.createObjectURL(blob);
  const link = document.createElement("a");
  link.href = url;
  link.download = filename;
  document.body.appendChild(link);
  link.click();
  link.remove();
  URL.revokeObjectURL(url);
}

function exportAllTasks() {
  downloadJson(`rundown-tasks-${dateKey(new Date())}.json`, {
    exportedAt: new Date().toISOString(),
    tasks: state.tasks
  });
  persist("已导出全部任务");
}

function importAllData(file) {
  if (!file) return;
  const reader = new FileReader();
  reader.addEventListener("load", () => {
    try {
      const data = JSON.parse(String(reader.result || "{}"));
      if (Array.isArray(data)) {
        state.tasks = data;
      } else if (Array.isArray(data.tasks) && !data.projects) {
        state.tasks = data.tasks;
      } else {
        state = normalizeState(data);
      }
      pendingDeleteId = null;
      pendingActionDeleteId = null;
      pendingProjectDeleteId = null;
      pendingMemberName = null;
      persist("已导入数据");
      app();
    } catch {
      persist("导入失败，请检查 JSON 文件");
    }
  });
  reader.readAsText(file);
}

function duplicateTask(id) {
  const source = state.tasks.find((task) => task.id === id);
  if (!source) return;
  const copy = {
    ...source,
    id: `t${Date.now()}`,
    title: `${source.title} 副本`,
    status: "todo",
    progress: 0
  };
  const index = state.tasks.findIndex((task) => task.id === id);
  state.tasks.splice(index + 1, 0, copy);
  state.selectedId = copy.id;
  pendingDeleteId = null;
  persist("已复制任务");
  app();
}

function deleteTask(id) {
  if (pendingDeleteId !== id) {
    pendingDeleteId = id;
    pendingActionDeleteId = null;
    app();
    return;
  }
  const index = state.tasks.findIndex((task) => task.id === id);
  if (index === -1) return;
  state.tasks.splice(index, 1);
  state.selectedId = state.tasks[Math.max(0, index - 1)]?.id || state.tasks[0]?.id || "";
  pendingDeleteId = null;
  persist("已删除任务");
  app();
}

function duplicateAction(id) {
  const source = state.actions.find((action) => action.id === id);
  if (!source) return;
  const copy = {
    ...source,
    id: `a${Date.now()}`,
    title: `${source.title} 副本`,
    done: false
  };
  const index = state.actions.findIndex((action) => action.id === id);
  state.actions.splice(index + 1, 0, copy);
  pendingActionDeleteId = null;
  persist("已复制行动");
  app();
}

function deleteAction(id) {
  if (pendingActionDeleteId !== id) {
    pendingActionDeleteId = id;
    pendingDeleteId = null;
    app();
    return;
  }
  state.actions = state.actions.filter((action) => action.id !== id);
  pendingActionDeleteId = null;
  persist("已删除行动");
  app();
}

function escapeHtml(value) {
  return String(value).replace(/[&<>"']/g, (char) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" })[char]);
}

function escapeAttr(value) {
  return escapeHtml(value);
}

app();
