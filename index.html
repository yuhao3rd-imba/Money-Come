<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Product RUNDOWN</title>
    <style>
:root {
  color-scheme: dark;
  --bg: #0b0e12;
  --bg-2: #10151c;
  --panel: #151a22;
  --panel-2: #1b222c;
  --line: #2a3340;
  --line-soft: rgba(255, 255, 255, 0.07);
  --text: #f3f5f0;
  --muted: #9aa6ad;
  --quiet: #64727b;
  --cyan: #50d7e8;
  --cyan-2: #1b8ea1;
  --amber: #f0b45d;
  --green: #74d28c;
  --red: #ee6d6d;
  --blue: #7da7ff;
  --shadow: 0 24px 70px rgba(0, 0, 0, 0.34);
  --radius: 8px;
  --radius-sm: 6px;
  font-family:
    Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
    sans-serif;
}

* {
  box-sizing: border-box;
}

body {
  margin: 0;
  min-height: 100vh;
  background:
    linear-gradient(90deg, rgba(80, 215, 232, 0.05), transparent 34%),
    radial-gradient(circle at 80% 4%, rgba(240, 180, 93, 0.08), transparent 28%),
    var(--bg);
  color: var(--text);
  letter-spacing: 0;
}

button,
input,
select,
textarea {
  font: inherit;
}

button {
  cursor: pointer;
}

.app-shell {
  min-height: 100vh;
}

.startup-error {
  display: grid;
  gap: 10px;
  max-width: 520px;
  margin: 12vh auto 0;
  padding: 18px;
  border: 1px solid rgba(238, 109, 109, 0.42);
  border-radius: var(--radius);
  color: var(--text);
  background: rgba(21, 26, 34, 0.88);
  box-shadow: var(--shadow);
}

.startup-error span {
  color: var(--muted);
  font-size: 13px;
}

.startup-error code {
  white-space: pre-wrap;
  color: var(--red);
  font-size: 12px;
}

.layout {
  display: grid;
  grid-template-columns: 248px minmax(560px, 1fr) 400px;
  min-height: 100vh;
}

.sidebar {
  border-right: 1px solid var(--line-soft);
  padding: 22px 18px;
  background: rgba(11, 14, 18, 0.82);
}

.brand {
  position: relative;
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 28px;
}

.brand-mark {
  display: grid;
  place-items: center;
  width: 38px;
  height: 38px;
  border: 1px solid rgba(240, 180, 93, 0.5);
  border-radius: var(--radius);
  color: var(--amber);
  background: rgba(240, 180, 93, 0.1);
}

.brand-title {
  margin: 0;
  font-size: 13px;
  font-weight: 760;
  white-space: nowrap;
}

.brand-subtitle {
  margin: 2px 0 0;
  color: var(--muted);
  font-size: 12px;
}

.brand-tools {
  position: relative;
  margin-left: auto;
}

.brand-menu-button {
  display: grid;
  place-items: center;
  width: 30px;
  height: 30px;
  border: 1px solid var(--line);
  border-radius: 6px;
  color: var(--muted);
  background: rgba(255, 255, 255, 0.02);
  font-size: 18px;
  line-height: 1;
}

.brand-menu {
  position: absolute;
  top: calc(100% + 6px);
  right: 0;
  z-index: 10000;
  display: none;
  min-width: 188px;
  padding: 6px;
  border: 1px solid var(--line);
  border-radius: var(--radius-sm);
  background: #111720;
  box-shadow: var(--shadow);
}

.brand-tools.open .brand-menu {
  display: grid;
  gap: 8px;
}

.brand-menu-section {
  display: grid;
  gap: 6px;
}

.brand-menu button,
.brand-menu label,
.brand-menu-section > span {
  display: flex;
  align-items: center;
  min-height: 30px;
  padding: 0 8px;
  border: 0;
  border-radius: 5px;
  color: var(--text);
  background: transparent;
  font-size: 12px;
  white-space: nowrap;
}

.brand-menu-section > span {
  min-height: auto;
  padding: 0 8px;
  color: var(--quiet);
  font-size: 10px;
  font-weight: 820;
}

.brand-project-list {
  display: grid;
  gap: 4px;
}

.brand-project-option {
  justify-content: flex-start;
  gap: 7px;
  width: 100%;
  text-align: left;
}

.brand-project-option span:last-child {
  min-width: 0;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.choice-dot {
  width: 10px;
  height: 10px;
  border: 1px solid var(--quiet);
  border-radius: 50%;
  background: transparent;
  flex: 0 0 auto;
}

.brand-project-option.selected .choice-dot {
  border-color: var(--amber);
  background: var(--amber);
  box-shadow: 0 0 0 3px rgba(240, 180, 93, 0.16);
}

.brand-menu-actions {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 6px;
  padding-top: 6px;
  border-top: 1px solid var(--line-soft);
}

.brand-menu label {
  border-top: 1px solid var(--line-soft);
}

.brand-menu-actions .confirm {
  color: #071014;
  background: var(--amber);
  font-weight: 820;
}

.brand-menu button:hover,
.brand-menu label:hover {
  background: var(--panel-2);
}

.brand-menu input {
  display: none;
}

.nav {
  display: grid;
  gap: 6px;
  margin-bottom: 24px;
}

.nav button,
.icon-button,
.phase-action,
.ghost-button,
.primary-button {
  border: 0;
  color: var(--text);
  background: transparent;
}

.nav button {
  display: flex;
  align-items: center;
  gap: 10px;
  width: 100%;
  min-height: 40px;
  padding: 0 10px;
  border-radius: var(--radius-sm);
  color: var(--muted);
  text-align: left;
  font-size: 13px;
}

.nav button.active {
  color: var(--text);
  background: var(--panel);
}

.nav svg,
.icon-button svg,
.ghost-button svg,
.primary-button svg {
  width: 16px;
  height: 16px;
  stroke-width: 2;
}

.sidebar-section {
  padding-top: 18px;
  border-top: 1px solid var(--line-soft);
}

.section-head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 8px;
  margin-bottom: 12px;
}

.section-title {
  margin: 0;
  color: var(--quiet);
  font-size: 11px;
  font-weight: 760;
  text-transform: uppercase;
}

.product-scope {
  display: grid;
  gap: 8px;
  margin: 0 0 10px;
  padding: 9px;
  border: 1px solid var(--line);
  border-radius: var(--radius-sm);
  background: rgba(255, 255, 255, 0.025);
}

.product-scope > span {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 8px;
  color: var(--muted);
  font-size: 11px;
}

.product-scope strong {
  color: var(--amber);
  font-size: 13px;
}

.scope-tabs {
  display: grid;
  grid-template-columns: repeat(3, minmax(0, 1fr));
  gap: 4px;
}

.scope-tabs button {
  min-height: 26px;
  border: 1px solid var(--line);
  border-radius: 5px;
  color: var(--muted);
  background: rgba(255, 255, 255, 0.02);
  font-size: 11px;
  font-weight: 720;
}

.scope-tabs button.active {
  color: #071014;
  border-color: var(--amber);
  background: var(--amber);
}

.project-list {
  display: grid;
  gap: 10px;
}

.project-card {
  padding: 12px;
  border: 1px solid var(--line);
  border-radius: var(--radius);
  background: rgba(21, 26, 34, 0.72);
}

.project-empty-card {
  display: grid;
  place-items: center;
  width: 100%;
  min-height: 132px;
  border: 1px dashed rgba(240, 180, 93, 0.58);
  border-radius: var(--radius);
  color: var(--muted);
  background: rgba(21, 26, 34, 0.36);
  font-size: 13px;
  font-weight: 780;
  text-align: center;
}

.project-empty-card:hover {
  color: var(--amber);
  border-color: var(--amber);
  background: rgba(240, 180, 93, 0.06);
}

.project-card.active {
  border-color: rgba(80, 215, 232, 0.5);
  background: rgba(27, 34, 44, 0.9);
}

.project-card.expanded {
  box-shadow: inset 0 0 0 1px rgba(80, 215, 232, 0.12);
}

.project-card h2 {
  margin: 0 0 8px;
  font-size: 15px;
  line-height: 1.25;
}

.project-summary {
  display: grid;
  grid-template-columns: auto 1fr;
  align-items: center;
  gap: 10px;
  width: 100%;
  padding: 0;
  border: 0;
  color: var(--text);
  background: transparent;
  text-align: left;
}

.project-copy {
  min-width: 0;
}

.project-copy strong,
.project-copy small {
  display: block;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.project-copy strong {
  font-size: 13px;
  line-height: 1.25;
}

.project-copy small {
  margin-top: 4px;
  color: var(--muted);
  font-size: 11px;
}

.project-expanded {
  display: grid;
  gap: 10px;
  margin-top: 10px;
  padding-top: 10px;
  border-top: 1px solid var(--line-soft);
}

.project-actions,
.urgency-picker {
  display: flex;
  align-items: center;
  gap: 7px;
  flex-wrap: wrap;
}

.project-actions {
  justify-content: flex-start;
}

.urgency-dot,
.urgency-choice {
  display: inline-block;
  border-radius: 50%;
  flex: 0 0 auto;
}

.urgency-dot {
  width: 11px;
  height: 11px;
  box-shadow: 0 0 0 4px rgba(255, 255, 255, 0.04);
}

.urgency-choice {
  width: 18px;
  height: 18px;
  border: 2px solid transparent;
  background: var(--quiet);
}

.urgency-choice.selected {
  border-color: var(--text);
}

.urgency-dot.red,
.urgency-choice.red {
  background: var(--red);
}

.urgency-dot.green,
.urgency-choice.green {
  background: var(--green);
}

.urgency-dot.yellow,
.urgency-choice.yellow {
  background: var(--amber);
}

.project-confirm {
  justify-self: start;
  min-height: 28px;
  padding: 0 9px;
  border: 1px solid rgba(238, 109, 109, 0.42);
  border-radius: 5px;
  color: #ff9a9a;
  background: rgba(238, 109, 109, 0.1);
  font-size: 11px;
}

.project-confirm.danger {
  color: #fff;
  border-color: var(--red);
  background: var(--red);
  font-weight: 820;
}

.mini-icon.disabled,
.mini-icon:disabled {
  color: var(--quiet);
  border-color: var(--line);
  background: rgba(255, 255, 255, 0.015);
  cursor: not-allowed;
  opacity: 0.58;
}

.meta-row {
  display: flex;
  justify-content: space-between;
  gap: 8px;
  color: var(--muted);
  font-size: 12px;
}

.progress-rail {
  height: 7px;
  margin: 14px 0 10px;
  overflow: hidden;
  border-radius: 20px;
  background: #0d1117;
}

.progress-fill {
  height: 100%;
  border-radius: inherit;
  background: linear-gradient(90deg, var(--cyan), var(--amber));
}

.tag-list {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  margin-top: 12px;
}

.tag {
  padding: 5px 7px;
  border: 1px solid var(--line);
  border-radius: var(--radius-sm);
  color: var(--muted);
  background: rgba(255, 255, 255, 0.03);
  font-size: 11px;
}

.main {
  padding: 22px;
  min-width: 0;
}

.topbar {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 18px;
  margin-bottom: 20px;
}

.title-block {
  flex: 1 1 auto;
  min-width: 0;
}

.title-block h1 {
  margin: 0;
  font-size: clamp(22px, 2.45vw, 34px);
  line-height: 1.05;
  font-weight: 780;
}

.title-row {
  display: flex;
  align-items: center;
  gap: 10px;
  flex-wrap: wrap;
}

.title-add-button {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 30px;
  height: 30px;
  border: 1px solid var(--line);
  border-radius: 6px;
  color: var(--amber);
  background: rgba(240, 180, 93, 0.08);
}

.title-add-button svg {
  width: 15px;
  height: 15px;
}

.member-chips {
  display: flex;
  align-items: center;
  gap: 8px;
  flex-wrap: wrap;
  margin-left: 8px;
}

.member-chip > span:first-child {
  pointer-events: none;
}

.member-chip {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  min-height: 28px;
  padding: 0 8px;
  border: 1px solid var(--line);
  border-radius: 5px;
  color: var(--muted);
  background: rgba(255, 255, 255, 0.02);
  font-size: 11px;
}

.member-chip.active {
  color: #071014;
  border-color: var(--cyan);
  background: var(--cyan);
  font-weight: 760;
}

.member-chip .member-remove {
  display: inline-grid;
  place-items: center;
  width: 16px;
  height: 16px;
  border-radius: 50%;
  background: rgba(7, 16, 20, 0.12);
  color: inherit;
  pointer-events: auto;
}

.member-chip .member-remove svg {
  width: 12px;
  height: 12px;
}

.title-block p {
  max-width: 620px;
  margin: 8px 0 0;
  color: var(--muted);
  font-size: 13px;
  line-height: 1.5;
}

.project-note-line {
  display: flex;
  align-items: flex-start;
  width: min(1120px, 100%);
  margin-top: 8px;
}

.project-note-line textarea {
  width: 100%;
  min-height: 56px;
  border: 1px solid transparent;
  border-radius: 6px;
  color: var(--muted);
  background: transparent;
  font-size: 13px;
  line-height: 1.45;
  padding: 0;
  resize: none;
}

.project-note-line textarea:focus {
  border-color: var(--line);
  background: rgba(255, 255, 255, 0.03);
  color: var(--text);
  padding: 6px 8px;
  outline: none;
}

.toolbar {
  display: flex;
  align-items: center;
  gap: 8px;
  flex-wrap: wrap;
  padding-top: 2px;
}

.segmented {
  display: flex;
  padding: 0;
  border: 1px solid var(--line);
  border-radius: 6px;
  overflow: hidden;
  background: #0e1319;
}

.segmented button {
  min-height: 30px;
  padding: 0 12px;
  border: 0;
  border-radius: 0;
  color: var(--muted);
  background: transparent;
  font-size: 11px;
}

.segmented button.active {
  color: var(--text);
  background: var(--panel-2);
}

.primary-button,
.ghost-button,
.icon-button,
.panel-action-button {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  min-height: 36px;
  border-radius: var(--radius-sm);
}

.panel-action-button {
  gap: 8px;
  padding: 0 10px;
  border: 1px solid var(--line);
  color: var(--text);
  background: rgba(255, 255, 255, 0.02);
  font-size: 12px;
  white-space: nowrap;
}

.panel-action-button.done {
  color: #071014;
  border-color: var(--green);
  background: var(--green);
  font-weight: 800;
}

.panel-action-button svg,
.primary-button svg,
.ghost-button svg {
  width: 16px;
  height: 16px;
  flex: 0 0 auto;
}

.primary-button {
  gap: 8px;
  padding: 0 12px;
  color: #071014;
  background: var(--cyan);
  font-size: 13px;
  font-weight: 720;
}

.ghost-button {
  gap: 8px;
  padding: 0 10px;
  border: 1px solid var(--line);
  color: var(--muted);
  background: rgba(255, 255, 255, 0.02);
  font-size: 12px;
}

.ghost-button.danger,
.mini-button.danger,
.mini-icon.danger {
  color: #ff9a9a;
  border-color: rgba(238, 109, 109, 0.38);
}

.filter-control {
  display: flex;
  align-items: center;
  gap: 8px;
  min-height: 36px;
  padding: 0 8px 0 10px;
  border: 1px solid var(--line);
  border-radius: var(--radius-sm);
  background: rgba(255, 255, 255, 0.02);
}

.filter-control label {
  display: inline-flex;
  align-items: center;
  gap: 7px;
  color: var(--muted);
  font-size: 12px;
  white-space: nowrap;
}

.filter-control svg {
  width: 16px;
  height: 16px;
}

.filter-control select {
  height: 28px;
  min-width: 96px;
  border: 0;
  border-radius: 5px;
  color: var(--text);
  background: var(--panel-2);
  font-size: 12px;
  padding: 0 8px;
}

.filter-chips {
  display: flex;
  align-items: center;
  justify-content: flex-end;
  gap: 6px;
  flex-wrap: wrap;
}

.rundown-controls {
  display: grid;
  flex: 0 1 430px;
  align-content: start;
  grid-template-rows: repeat(2, 24px);
  gap: 5px;
  min-width: 330px;
  max-width: 430px;
}

.rundown-filter-row {
  display: grid;
  grid-template-columns: repeat(5, minmax(62px, 1fr));
  grid-auto-rows: 24px;
  align-items: stretch;
  gap: 5px;
  height: 24px;
}

.rundown-filter-row > span {
  height: 24px;
  min-height: 0;
}

.filter-chip {
  align-self: stretch;
  height: 24px;
  max-height: 24px;
  min-height: 24px;
  padding: 0 6px;
  border: 1px solid var(--line);
  border-radius: 5px;
  color: var(--muted);
  background: rgba(255, 255, 255, 0.02);
  font-size: 10px;
  width: 100%;
}

.filter-chip.active {
  color: #071014;
  border-color: var(--cyan);
  background: var(--cyan);
  font-weight: 760;
}

.filter-chip.status-todo.active {
  color: #081016;
  border-color: #aeb7bd;
  background: #aeb7bd;
}

.filter-chip.status-active.active {
  color: #151008;
  border-color: var(--amber);
  background: var(--amber);
}

.filter-chip.status-risk.active {
  color: #fff5f5;
  border-color: var(--red);
  background: var(--red);
}

.filter-chip.status-done.active {
  color: #07130b;
  border-color: var(--green);
  background: var(--green);
}

.add-inline-button {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  align-self: stretch;
  gap: 4px;
  height: 24px;
  max-height: 24px;
  min-height: 24px;
  padding: 0 7px;
  border: 1px solid var(--amber);
  border-radius: 5px;
  color: #161008;
  background: var(--amber);
  font-size: 10px;
  font-weight: 800;
  width: 100%;
}

.add-inline-button svg {
  width: 11px;
  height: 11px;
}

.icon-button {
  width: 36px;
  border: 1px solid var(--line);
  color: var(--muted);
  background: rgba(255, 255, 255, 0.02);
}

.stats-grid {
  display: grid;
  grid-template-columns: repeat(4, minmax(0, 1fr));
  gap: 10px;
  margin-bottom: 16px;
}

.stat {
  min-height: 92px;
  padding: 14px;
  border: 1px solid var(--line);
  border-radius: var(--radius);
  background: linear-gradient(180deg, rgba(27, 34, 44, 0.86), rgba(21, 26, 34, 0.72));
}

.stat.clickable {
  cursor: pointer;
}

.stat.clickable:hover {
  border-color: rgba(80, 215, 232, 0.56);
  background: linear-gradient(180deg, rgba(30, 41, 52, 0.92), rgba(21, 26, 34, 0.78));
}

.stat span {
  color: var(--muted);
  font-size: 12px;
}

.stat strong {
  display: block;
  margin-top: 10px;
  font-size: 26px;
  line-height: 1;
}

.stat em {
  display: block;
  margin-top: 8px;
  color: var(--quiet);
  font-size: 11px;
  font-style: normal;
}

.board-panel,
.calendar-panel,
.queue-panel,
.detail-panel {
  border: 1px solid var(--line);
  border-radius: var(--radius);
  background: rgba(16, 21, 28, 0.82);
  box-shadow: var(--shadow);
}

.panel-head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  padding: 14px 16px;
  border-bottom: 1px solid var(--line-soft);
}

.board-panel > .panel-head > div:first-child {
  min-width: 0;
}

.panel-head h2,
.panel-head h3 {
  margin: 0;
  font-size: 14px;
}

.panel-head p {
  margin: 3px 0 0;
  color: var(--muted);
  font-size: 12px;
}

.board-panel > .panel-head p {
  font-size: 9.5px;
}

.panel-head > svg {
  width: 18px;
  height: 18px;
  color: var(--muted);
  flex: 0 0 auto;
}

.rundown {
  display: grid;
}

.phase-row {
  position: relative;
  display: grid;
  grid-template-columns: 126px 1fr;
  min-height: 98px;
  border-bottom: 1px solid var(--line-soft);
  border-radius: var(--radius);
  overflow: hidden;
  cursor: pointer;
}

.phase-row.active {
  border-bottom-color: var(--amber);
  outline: 1px solid var(--amber);
  outline-offset: -1px;
  box-shadow: inset 0 0 0 1px rgba(240, 180, 93, 0.18), 0 0 18px rgba(240, 180, 93, 0.12);
}

.phase-row.active .phase-label {
  color: var(--amber);
  font-weight: 820;
}

.phase-row.active .phase-label strong {
  color: #ffd58f;
}

.phase-row.active .phase-label span {
  color: rgba(255, 213, 143, 0.78);
}

.phase-row:last-child {
  border-bottom: 0;
}

.phase-label {
  position: relative;
  z-index: 1;
  display: grid;
  grid-template-columns: 16px 1fr;
  align-content: start;
  column-gap: 8px;
  width: 100%;
  padding: 12px 12px 12px 14px;
  border: 0;
  border-right: 0;
  color: var(--text);
  background: transparent;
  text-align: left;
}

.phase-label::before {
  display: none;
}

.phase-row:last-child .phase-label::before {
  display: none;
}

.phase-index {
  display: block;
  width: auto;
  height: auto;
  grid-row: 1 / span 2;
  color: var(--muted);
  background: transparent;
  border-radius: 0;
  font-size: 12px;
  font-weight: 720;
  line-height: 1.2;
}

.phase-label strong {
  display: block;
  font-size: 13px;
  line-height: 1.2;
  white-space: nowrap;
}

.phase-label span {
  display: block;
  margin-top: 4px;
  color: var(--muted);
  font-size: 11px;
  line-height: 1.25;
}

.phase-work {
  position: relative;
  z-index: 1;
  display: grid;
  grid-template-columns: repeat(3, minmax(0, 1fr));
  align-items: start;
  gap: 8px;
  padding: 8px;
}

.task-card {
  min-height: 0;
  padding: 8px;
  border: 1px solid var(--line);
  border-radius: var(--radius);
  background: rgba(27, 34, 44, 0.66);
  text-align: left;
  cursor: pointer;
}

.task-card.selected {
  border-color: var(--cyan);
  color: #071014;
  background: var(--cyan);
  box-shadow: 0 12px 28px rgba(80, 215, 232, 0.2);
}

.task-card.selected .task-title,
.task-card.selected .task-meta,
.task-card.selected .task-status {
  color: #071014;
}

.task-card.selected .owner-tag {
  border-color: rgba(7, 16, 20, 0.22);
  color: #071014;
  background: rgba(7, 16, 20, 0.08);
}

.task-card.selected .status-dot {
  box-shadow: 0 0 0 3px rgba(7, 16, 20, 0.16);
}

.task-card.selected .task-progress {
  background: rgba(7, 16, 20, 0.18);
}

.task-card.selected .task-progress span {
  background: #071014;
}

.task-card.selected .task-actions {
  border-top-color: rgba(7, 16, 20, 0.16);
}

.task-card.selected .mini-button {
  border-color: rgba(7, 16, 20, 0.24);
  color: #071014;
  background: rgba(7, 16, 20, 0.06);
}

.task-card.selected .mini-button.danger {
  color: #6f1414;
}

.task-card.compact {
  min-height: 118px;
}

.task-top {
  display: flex;
  justify-content: space-between;
  gap: 8px;
  align-items: flex-start;
}

.task-title {
  margin: 0;
  color: var(--text);
  display: -webkit-box;
  overflow: hidden;
  font-size: 12px;
  line-height: 1.25;
  font-weight: 720;
  -webkit-box-orient: vertical;
  -webkit-line-clamp: 2;
}

.task-title.placeholder {
  color: var(--muted);
  font-weight: 680;
}

.status-dot {
  flex: 0 0 auto;
  width: 8px;
  height: 8px;
  margin-top: 2px;
  border-radius: 50%;
  background: #aeb7bd;
}

.task-status {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  flex: 0 0 auto;
  color: var(--muted);
  font-size: 10px;
  line-height: 1;
  white-space: nowrap;
}

.status-dot.done {
  background: var(--green);
}

.status-dot.active {
  background: var(--amber);
}

.status-dot.risk {
  background: var(--red);
}

.status-dot.todo {
  background: #aeb7bd;
}

.task-meta {
  display: flex;
  justify-content: space-between;
  gap: 8px;
  margin-top: 6px;
  color: var(--muted);
  font-size: 10px;
  line-height: 1.2;
}

.task-meta span {
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.owner-tag {
  display: inline-flex;
  align-items: center;
  max-width: 58%;
  min-height: 18px;
  padding: 0 6px;
  border: 1px solid rgba(80, 215, 232, 0.28);
  border-radius: 999px;
  color: var(--cyan);
  background: rgba(80, 215, 232, 0.08);
  font-weight: 760;
}

.task-progress {
  height: 4px;
  margin-top: 6px;
  overflow: hidden;
  border-radius: 20px;
  background: #0d1117;
}

.task-progress span {
  display: block;
  height: 100%;
  border-radius: inherit;
  background: var(--amber);
}

.task-actions,
.detail-actions,
.queue-tools {
  display: flex;
  align-items: center;
  gap: 7px;
  flex-wrap: wrap;
}

.task-actions {
  margin-top: 6px;
  padding-top: 6px;
  border-top: 1px solid var(--line-soft);
}

.task-actions .mini-button {
  min-height: 22px;
  padding: 0 6px;
  font-size: 10px;
}

.task-actions .mini-button svg {
  width: 11px;
  height: 11px;
}

.detail-actions {
  margin-top: 4px;
}

.mini-button,
.mini-icon {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 5px;
  min-height: 28px;
  border: 1px solid var(--line);
  border-radius: 5px;
  color: var(--muted);
  background: rgba(255, 255, 255, 0.02);
  font-size: 11px;
}

.mini-button {
  padding: 0 8px;
}

.mini-icon {
  width: 28px;
  padding: 0;
}

.mini-button svg,
.mini-icon svg {
  width: 13px;
  height: 13px;
  stroke-width: 2;
}

.mini-icon.archive {
  color: var(--amber);
  border-color: rgba(240, 180, 93, 0.38);
  background: rgba(240, 180, 93, 0.07);
}

.lower-grid {
  display: grid;
  grid-template-columns: 1fr;
  gap: 12px;
  margin-top: 12px;
}

.inline-inspector {
  display: none;
  margin-top: 12px;
}

.phase-inline-inspector {
  display: none;
}

.task-inline-inspector {
  display: none;
}

.work-grid {
  display: grid;
  grid-template-columns: repeat(4, minmax(0, 1fr));
  gap: 12px;
}

.work-column,
.milestone-panel,
.campaign-panel,
.asset-panel,
.risk-panel,
.review-panel {
  border: 1px solid var(--line);
  border-radius: var(--radius);
  background: rgba(16, 21, 28, 0.82);
  box-shadow: var(--shadow);
}

.work-column {
  min-height: 420px;
  padding: 12px;
}

.column-head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 8px;
}

.column-head h2 {
  margin: 0;
  font-size: 13px;
}

.column-head span {
  display: grid;
  place-items: center;
  min-width: 24px;
  height: 24px;
  border-radius: 50%;
  color: #071014;
  background: var(--cyan);
  font-size: 11px;
  font-weight: 800;
}

.work-column > p {
  margin: 7px 0 12px;
  color: var(--muted);
  font-size: 11px;
}

.column-list {
  display: grid;
  gap: 10px;
}

.acceptance-box {
  margin-top: 10px;
  padding: 9px;
  border: 1px solid var(--line-soft);
  border-radius: 6px;
  color: var(--muted);
  background: rgba(255, 255, 255, 0.03);
  font-size: 11px;
  line-height: 1.35;
}

.milestone-panel {
  margin-top: 12px;
}

.milestone-track {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 1px;
  padding: 12px;
  background: rgba(255, 255, 255, 0.03);
}

.milestone {
  min-height: 96px;
  padding: 12px;
  background: #111720;
}

.milestone span {
  display: grid;
  place-items: center;
  width: 26px;
  height: 26px;
  border-radius: 50%;
  color: var(--muted);
  border: 1px solid var(--line);
  font-size: 11px;
}

.milestone strong {
  display: block;
  margin-top: 12px;
  font-size: 12px;
}

.milestone.done span,
.milestone.active span {
  color: #071014;
  border-color: transparent;
  background: var(--green);
}

.milestone.active span {
  background: var(--cyan);
}

.marketing-layout,
.risk-layout {
  display: grid;
  grid-template-columns: 1.4fr 0.9fr;
  gap: 12px;
  margin-bottom: 12px;
}

.campaign-stages {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 10px;
  padding: 12px;
}

.campaign-stage {
  min-height: 210px;
  padding: 12px;
  border: 1px solid var(--line);
  border-radius: var(--radius);
  background: rgba(27, 34, 44, 0.56);
}

.campaign-stage h3 {
  margin: 0 0 12px;
  font-size: 13px;
}

.campaign-stage.cyan h3 {
  color: var(--cyan);
}

.campaign-stage.amber h3 {
  color: var(--amber);
}

.campaign-stage.green h3 {
  color: var(--green);
}

.stage-action {
  display: block;
  width: 100%;
  min-height: 34px;
  margin-bottom: 8px;
  padding: 0 10px;
  border: 1px solid var(--line);
  border-radius: 6px;
  color: var(--text);
  background: rgba(255, 255, 255, 0.03);
  text-align: left;
  font-size: 12px;
}

.asset-list,
.risk-list,
.review-list {
  display: grid;
  gap: 8px;
  padding: 12px;
}

.asset-row {
  display: grid;
  grid-template-columns: auto 1fr auto;
  align-items: center;
  gap: 10px;
  min-height: 40px;
  padding: 0 10px;
  border: 1px solid var(--line);
  border-radius: 6px;
  background: rgba(255, 255, 255, 0.03);
  font-size: 12px;
}

.asset-row input {
  width: 15px;
  height: 15px;
  accent-color: var(--cyan);
}

.asset-row em {
  color: var(--muted);
  font-size: 11px;
  font-style: normal;
}

.risk-card {
  display: grid;
  grid-template-columns: 1fr auto;
  gap: 12px;
  padding: 12px;
  border: 1px solid var(--line);
  border-radius: var(--radius);
  background: rgba(27, 34, 44, 0.62);
  cursor: pointer;
}

.risk-card.selected {
  border-color: rgba(80, 215, 232, 0.72);
}

.risk-card h3 {
  margin: 8px 0 6px;
  font-size: 13px;
}

.risk-card p {
  margin: 0;
  color: var(--muted);
  font-size: 12px;
  line-height: 1.45;
}

.risk-level {
  display: inline-flex;
  align-items: center;
  min-height: 22px;
  padding: 0 7px;
  border-radius: 5px;
  color: #071014;
  background: var(--amber);
  font-size: 11px;
  font-weight: 800;
}

.risk-level.high {
  color: #fff;
  background: var(--red);
}

.risk-meta {
  display: grid;
  align-content: start;
  gap: 6px;
  color: var(--muted);
  font-size: 11px;
  text-align: right;
}

.archive-panel {
  border: 1px solid var(--line);
  border-radius: var(--radius);
  background: rgba(16, 21, 28, 0.82);
  box-shadow: var(--shadow);
}

.archive-head > svg {
  color: var(--amber);
}

.archive-toolbar {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 12px;
  border-bottom: 1px solid var(--line-soft);
}

.archive-search {
  display: flex;
  align-items: center;
  gap: 8px;
  flex: 1;
  min-width: 0;
  height: 38px;
  padding: 0 10px;
  border: 1px solid var(--line);
  border-radius: var(--radius-sm);
  background: #0e1319;
}

.archive-search svg {
  width: 15px;
  height: 15px;
  color: var(--muted);
  flex: 0 0 auto;
}

.archive-search input {
  width: 100%;
  border: 0;
  outline: 0;
  color: var(--text);
  background: transparent;
  font-size: 12px;
}

.archive-search input::placeholder {
  color: var(--quiet);
}

.archive-grid {
  display: grid;
  grid-template-columns: minmax(0, 1fr) 240px;
  gap: 12px;
  padding: 12px;
}

.archive-list {
  display: grid;
  gap: 10px;
}

.archive-record {
  display: grid;
  gap: 10px;
  padding: 12px;
  border: 1px solid var(--line);
  border-radius: var(--radius);
  background: rgba(27, 34, 44, 0.62);
}

.archive-record[hidden] {
  display: none;
}

.archive-record-main {
  display: grid;
  grid-template-columns: 38px minmax(0, 1fr);
  gap: 10px;
}

.archive-folder {
  display: grid;
  place-items: center;
  width: 38px;
  height: 38px;
  border: 1px solid rgba(240, 180, 93, 0.34);
  border-radius: var(--radius-sm);
  color: var(--amber);
  background: rgba(240, 180, 93, 0.07);
}

.archive-folder svg {
  width: 18px;
  height: 18px;
}

.archive-record h3 {
  margin: 0;
  font-size: 15px;
}

.archive-record p {
  margin: 5px 0 0;
  color: var(--muted);
  font-size: 12px;
  line-height: 1.45;
}

.archive-tags,
.archive-stage-line,
.archive-task-preview,
.archive-actions {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
}

.archive-tags {
  margin-top: 8px;
}

.archive-tags span,
.archive-stage-line span,
.archive-task-preview span {
  min-height: 24px;
  padding: 0 8px;
  border: 1px solid var(--line);
  border-radius: 999px;
  color: var(--muted);
  background: rgba(255, 255, 255, 0.025);
  font-size: 11px;
  line-height: 22px;
}

.archive-metrics {
  display: grid;
  grid-template-columns: repeat(3, minmax(0, 1fr));
  gap: 8px;
}

.archive-metrics span {
  min-height: 48px;
  padding: 8px;
  border: 1px solid var(--line-soft);
  border-radius: var(--radius-sm);
  color: var(--muted);
  background: rgba(255, 255, 255, 0.025);
  font-size: 11px;
}

.archive-metrics strong {
  display: block;
  margin-bottom: 3px;
  color: var(--text);
  font-size: 18px;
}

.archive-task-preview {
  padding-top: 8px;
  border-top: 1px solid var(--line-soft);
}

.archive-actions {
  justify-content: flex-end;
}

.archive-index {
  position: sticky;
  top: 18px;
  align-self: start;
  padding: 12px;
  border: 1px solid var(--line);
  border-radius: var(--radius);
  background: rgba(11, 14, 18, 0.46);
}

.archive-index h3 {
  margin: 0 0 10px;
  font-size: 13px;
}

.archive-index-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  min-height: 34px;
  border-bottom: 1px solid var(--line-soft);
  color: var(--muted);
  font-size: 12px;
}

.archive-index-row strong {
  color: var(--text);
}

.archive-index p {
  margin: 12px 0 0;
  color: var(--muted);
  font-size: 12px;
  line-height: 1.45;
}

.archive-empty {
  min-height: 180px;
  border: 1px dashed rgba(240, 180, 93, 0.5);
  border-radius: var(--radius);
  color: var(--muted);
  background: rgba(240, 180, 93, 0.04);
  font-size: 13px;
  font-weight: 780;
}

.review-item {
  padding: 12px;
  border: 1px solid var(--line);
  border-radius: var(--radius);
  background: rgba(255, 255, 255, 0.03);
}

.review-item strong,
.review-item span {
  display: block;
}

.review-item strong {
  font-size: 12px;
}

.review-item span {
  margin-top: 6px;
  color: var(--muted);
  font-size: 11px;
  line-height: 1.4;
}

.empty-state.compact {
  padding: 16px;
}

.calendar-body {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 1px;
  padding: 12px;
  background: rgba(255, 255, 255, 0.03);
}

.day {
  min-height: 86px;
  padding: 8px;
  background: #111720;
}

.day strong {
  display: block;
  color: var(--muted);
  font-size: 11px;
  font-weight: 640;
}

.event {
  margin-top: 8px;
  padding: 7px;
  border-radius: 6px;
  color: #071014;
  background: var(--amber);
  font-size: 11px;
  line-height: 1.25;
}

.event.cyan {
  background: var(--cyan);
}

.event.green {
  background: var(--green);
}

.queue-list {
  display: grid;
  gap: 8px;
  padding: 12px;
}

.queue-item {
  display: grid;
  grid-template-columns: auto 1fr auto;
  align-items: center;
  gap: 10px;
  padding: 10px;
  border: 1px solid var(--line);
  border-radius: var(--radius);
  background: rgba(27, 34, 44, 0.52);
}

.queue-tools {
  grid-column: 2 / -1;
  justify-content: flex-start;
  margin-top: -2px;
}

.queue-item input {
  width: 16px;
  height: 16px;
  accent-color: var(--cyan);
}

.queue-copy strong {
  display: block;
  font-size: 12px;
}

.queue-copy span {
  display: block;
  margin-top: 3px;
  color: var(--muted);
  font-size: 11px;
}

.priority {
  padding: 4px 6px;
  border-radius: 5px;
  color: #071014;
  background: var(--cyan);
  font-size: 10px;
  font-weight: 800;
}

.priority.high {
  background: var(--red);
  color: #fff;
}

.priority.mid {
  background: var(--amber);
}

.inspector {
  padding: 22px 18px;
  border-left: 1px solid var(--line-soft);
  background: rgba(11, 14, 18, 0.88);
}

.detail-panel {
  position: sticky;
  top: 18px;
  overflow: visible;
}

.detail-body {
  padding: 18px;
}

.field {
  margin-bottom: 14px;
}

.field label {
  display: block;
  margin-bottom: 7px;
  color: var(--quiet);
  font-size: 11px;
  font-weight: 780;
  text-transform: uppercase;
}

.field input,
.field select,
.field textarea {
  width: 100%;
  border: 1px solid var(--line);
  border-radius: var(--radius-sm);
  color: var(--text);
  background: #0e1319;
  font-size: 13px;
}

.field input::placeholder,
.field textarea::placeholder {
  color: var(--quiet);
  opacity: 0.72;
}

.field input,
.field select {
  height: 38px;
  padding: 0 10px;
}

.field textarea {
  min-height: 88px;
  padding: 10px;
  resize: vertical;
  line-height: 1.45;
}

.status-select {
  position: relative;
}

.status-select select {
  padding-left: 28px;
}

.status-select-dot {
  position: absolute;
  top: 50%;
  left: 10px;
  width: 9px;
  height: 9px;
  border-radius: 50%;
  background: #aeb7bd;
  transform: translateY(-50%);
  pointer-events: none;
}

.status-select-dot.todo {
  background: #aeb7bd;
}

.status-select-dot.active {
  background: var(--amber);
}

.status-select-dot.risk {
  background: var(--red);
}

.status-select-dot.done {
  background: var(--green);
}

.date-picker {
  position: relative;
  overflow: visible;
  border: 1px solid var(--line);
  border-radius: var(--radius-sm);
  background: #0e1319;
}

.date-input-row {
  display: grid;
  grid-template-columns: 38px 1fr;
  align-items: center;
  min-height: 42px;
  border-bottom: 1px solid var(--line);
}

.date-icon {
  display: grid;
  place-items: center;
  height: 100%;
  border: 0;
  border-right: 1px solid var(--line);
  color: var(--muted);
  background: transparent;
}

.date-icon svg {
  width: 17px;
  height: 17px;
}

.date-input-row input {
  width: 100%;
  height: 42px;
  border: 0;
  color: var(--text);
  background: transparent;
  padding: 0 12px;
  font-size: 13px;
}

.date-input-row input:focus {
  outline: 1px solid var(--cyan-2);
  outline-offset: -1px;
}

.calendar-popover {
  position: absolute;
  z-index: 20;
  top: calc(100% + 6px);
  right: 0;
  width: min(268px, calc(100vw - 32px));
  border: 1px solid var(--line);
  border-radius: var(--radius);
  overflow: hidden;
  box-shadow: var(--shadow);
  background: #121820;
}

.calendar-month {
  display: grid;
  grid-template-columns: 28px 1fr 28px;
  align-items: center;
  min-height: 36px;
  border-bottom: 1px solid var(--line);
  background: #151b23;
}

.calendar-month strong,
.calendar-title {
  text-align: center;
  font-size: 13px;
}

.calendar-title {
  display: flex;
  justify-content: center;
  gap: 5px;
}

.calendar-title button,
.picker-head button {

function storageKeys() {
  try {
    return Array.from({ length: window.localStorage?.length || 0 }, (_, index) => window.localStorage.key(index)).filter(Boolean);
  } catch {

  }
}

function normalizeState(nextState) {
  if (!pageRegistry[nextState.activePage] || !visiblePages.includes(nextState.activePage)) {
    nextState.activePage = "overview";
  }
  if (!["all", "month", "week", "day"].includes(nextState.view)) {
    nextState.view = "all";
  }
  if (!["all", "todo", "active", "risk", "done"].includes(nextState.filter)) {
    nextState.filter = "all";
  }
  if (!phases.includes(nextState.activePhase)) {
    nextState.activePhase = "洞察";
  }
  if (!Array.isArray(nextState.projects)) {
    nextState.projects = [];
  }
  if (!Array.isArray(nextState.tasks)) {
    nextState.tasks = [];
  }
  if (!Array.isArray(nextState.actions)) {
    nextState.actions = [];
  }
  if (!Array.isArray(nextState.archivedProjects)) {
    nextState.archivedProjects = [];
  }
  if (!nextState.selectedProjectId || !nextState.projects.some((project) => project.id === nextState.selectedProjectId)) {
    nextState.selectedProjectId = nextState.projects[0]?.id || "";
  }
  if (!nextState.expandedProjectId || !nextState.projects.some((project) => project.id === nextState.expandedProjectId)) {
    nextState.expandedProjectId = nextState.selectedProjectId;
  }
  nextState.projects = nextState.projects.map((project) => ({
    owner: "Founder",
    due: "06/28",
    urgency: "yellow",
    note: "把产品开发、落地执行和营销节奏放进同一个推进面板。",
    members: [],
    stages: null,
    ...project
  }));
  nextState.archivedProjects = nextState.archivedProjects.map((project) => ({
    owner: "Founder",
    due: "待定",
    urgency: "yellow",
    note: "",
    members: [],
    stages: null,
    tasks: [],
    archivedAt: new Date().toISOString(),
    ...project
  }));
  nextState.archivedProjects.forEach((project) => {
    if (!Array.isArray(project.tasks)) project.tasks = [];
  });
  const activeProject = nextState.projects.find((project) => project.id === nextState.selectedProjectId) || nextState.projects[0] || null;
  const activeStages = stageNames(activeProject);
  if (!activeStages.includes(nextState.activePhase)) {
    nextState.activePhase = activeStages[0] || "立项";
  }
  if (!nextState.projects.length && nextState.archivedProjects.length && visiblePages.includes("archive") && nextState.activePage !== "archive") {
    nextState.activePage = "archive";
  }
  return nextState;
}

function persist(message = "已自动保存") {
  const previous = storageGet(STORAGE_KEY);
  if (hasSavedContent(parseStoredState(previous))) {
    storageSet(BACKUP_KEY, previous);
  }
  storageSet(STORAGE_KEY, JSON.stringify(state));
  const notices = document.querySelectorAll(".save-state");
  if (notices.length) {
    notices.forEach((el) => {
      el.textContent = message;
    });
    clearTimeout(saveTimer);
    saveTimer = setTimeout(() => {
      notices.forEach((el) => {
        el.textContent = "";
      });
    }, 1800);
  }
}

function currentProject() {
  return state.projects.find((project) => project.id === state.selectedProjectId) || state.projects[0] || null;
}

function normalizeStages(stages, fallback = legacyStages) {
  const source = Array.isArray(stages) && stages.length ? stages : fallback;
  return source
    .map((stage) => {
      if (typeof stage === "string") return { name: stage.trim(), hint: "" };
      return { name: String(stage?.name || "").trim(), hint: String(stage?.hint || "").trim() };
    })
    .filter((stage) => stage.name);
}

function currentStages(project = currentProject()) {
  return project ? normalizeStages(project.stages) : [];
}

function stageNames(project = currentProject()) {
  return project ? normalizeStages(project.stages).map((stage) => stage.name) : [];
}

function activeTaskPhase(project = currentProject()) {
  const names = stageNames(project);
  return names.includes(state.activePhase) ? state.activePhase : names[0] || "立项";
}

function viewTasks() {
  if (!currentProject()) return [];
  const project = currentProject();
  return sortTasks(state.tasks.filter((task) => {
    const inProject = task.projectId ? task.projectId === project.id : project.id === state.selectedProjectId;
    return inProject && isTaskInView(task);
  }));
}

function taskProgress(tasks) {
  return tasks.length ? Math.round(tasks.reduce((sum, task) => sum + Number(task.progress || 0), 0) / tasks.length) : 0;
}

function sortTasks(tasks) {
  return [...tasks].sort((a, b) => {
    const dateA = parseDueDate(a.due)?.getTime() ?? Number.MAX_SAFE_INTEGER;
    const dateB = parseDueDate(b.due)?.getTime() ?? Number.MAX_SAFE_INTEGER;
    if (dateA !== dateB) return dateA - dateB;
    return String(a.title).localeCompare(String(b.title), "zh-Hans-CN");
  });
}

function isTaskInView(task) {
  if (state.view === "all") return true;
  if (state.view === "month") return isDueInRange(task.due, startOfMonth(new Date()), endOfMonth(new Date()));
  if (state.view === "week") return isDueInRange(task.due, startOfWeek(new Date()), endOfWeek(new Date()));
  return isDueInRange(task.due, startOfDay(new Date()), endOfDay(new Date()));
}

function parseDueDate(value) {
  const text = String(value || "");
  const iso = text.match(/^(\d{4})-(\d{2})-(\d{2})$/);
  if (iso) return new Date(Number(iso[1]), Number(iso[2]) - 1, Number(iso[3]));
  const fullSlash = text.match(/^(\d{4})\/(\d{1,2})\/(\d{1,2})$/);
  if (fullSlash) return new Date(Number(fullSlash[1]), Number(fullSlash[2]) - 1, Number(fullSlash[3]));
  const short = text.match(/^(\d{1,2})\/(\d{1,2})$/);
  if (!short) return null;
  return new Date(new Date().getFullYear(), Number(short[1]) - 1, Number(short[2]));
}

function toDateInputValue(value) {
  const due = parseDueDate(value);
  if (!due) return "";
  return `${due.getFullYear()}-${String(due.getMonth() + 1).padStart(2, "0")}-${String(due.getDate()).padStart(2, "0")}`;
}

function displayDue(value) {
  const due = parseDueDate(value);
  if (!due) return String(value || "未定");
  return `${due.getFullYear()}/${String(due.getMonth() + 1).padStart(2, "0")}/${String(due.getDate()).padStart(2, "0")}`;
}

function formatArchiveDate(value) {
  const date = value ? new Date(value) : null;
  if (!date || Number.isNaN(date.getTime())) return "未知时间";
  return `${date.getFullYear()}/${String(date.getMonth() + 1).padStart(2, "0")}/${String(date.getDate()).padStart(2, "0")}`;
}

function monthLabel(date) {
  return `${date.getFullYear()}年 ${date.getMonth() + 1}月`;
}

function dateKey(date) {
  return `${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, "0")}-${String(date.getDate()).padStart(2, "0")}`;
}

function isDueInRange(value, start, end) {
  const due = parseDueDate(value);
  if (!due) return false;
  return due >= start && due <= end;
}

function startOfDay(date) {
  return new Date(date.getFullYear(), date.getMonth(), date.getDate());
}

function endOfDay(date) {
  return new Date(date.getFullYear(), date.getMonth(), date.getDate(), 23, 59, 59, 999);
}

function startOfWeek(date) {
  const day = date.getDay() || 7;
  return new Date(date.getFullYear(), date.getMonth(), date.getDate() - day + 1);
}

function endOfWeek(date) {
  const start = startOfWeek(date);
  return new Date(start.getFullYear(), start.getMonth(), start.getDate() + 6, 23, 59, 59, 999);
}

function startOfMonth(date) {
  return new Date(date.getFullYear(), date.getMonth(), 1);
}

function endOfMonth(date) {
  return new Date(date.getFullYear(), date.getMonth() + 1, 0, 23, 59, 59, 999);
}

function calendarPanel(selected, view) {
  if (calendarMode === "year") return yearPanel(view);

  const gridStart = new Date(first);
  gridStart.setDate(first.getDate() - first.getDay());
  const cells = Array.from({ length: 42 }, (_, index) => {
    const date = new Date(gridStart);
    date.setDate(gridStart.getDate() + index);
    const inMonth = date.getMonth() === view.getMonth();
    const isSelected = dateKey(date) === dateKey(selected);
    const isToday = dateKey(date) === dateKey(new Date());
    const disabled = !isCalendarDateAllowed(date);
    return `
      <button class="calendar-day ${inMonth ? "" : "muted"} ${isToday ? "today" : ""} ${isSelected ? "selected" : ""}" data-date="${dateKey(date)}" ${disabled ? "disabled" : ""}>

      ${isExpanded ? `
        <div class="project-expanded">

            ${urgencyOptions().map(([value, label]) => `<button class="urgency-choice ${value} ${project.urgency === value ? "selected" : ""}" title="${label}" data-urgency="${project.id}:${value}"></button>`).join("")}

function emptyProjectCard() {

function archivePage() {
  const archived = state.archivedProjects;
  return `
    <section class="archive-panel">

        <div>
          <h2>项目档案柜</h2>

        </div>

      </div>
      <div class="archive-toolbar">
        <label class="archive-search">
          <span>${icon.filter}</span>
          <input type="search" value="${escapeAttr(archiveQuery)}" placeholder="搜索项目、负责人、阶段或任务" data-archive-search />
        </label>
        <button class="ghost-button" data-add-project>${icon.plus}新项目</button>

        <div class="archive-list">

        <aside class="archive-index">

        </aside>

function archiveRecord(project) {
  const tasks = project.tasks || [];
  const done = tasks.filter((task) => task.status === "done").length;
  const risks = tasks.filter((task) => task.status === "risk" || task.risk === "高").length;
  const stages = normalizeStages(project.stages).map((stage) => stage.name).slice(0, 4);
  return `
    <article class="archive-record" data-archive-record="${project.id}">
      <div class="archive-record-main">
        <span class="archive-folder">${icon.folder}</span>
        <div>
          <h3>${escapeHtml(project.name)}</h3>
          <p>${escapeHtml(project.note || "暂无档案备注")}</p>
          <div class="archive-tags">
            <span>${escapeHtml(project.owner || "未标记负责人")}</span>
            <span>${formatArchiveDate(project.archivedAt)}</span>
            <span>${tasks.length} 个任务</span>
          </div>
        </div>
      </div>
      <div class="archive-metrics">
        <span><strong>${done}</strong>已完成</span>
        <span><strong>${risks}</strong>风险</span>
        <span><strong>${stages.length}</strong>阶段</span>
      </div>
      <div class="archive-stage-line">
        ${stages.map((stage) => `<span>${escapeHtml(stage)}</span>`).join("") || `<span>暂无阶段</span>`}
      </div>
      <div class="archive-task-preview">
        ${tasks.slice(0, 3).map((task) => `<span>${taskTitle(task)}</span>`).join("") || `<span>没有任务快照</span>`}
      </div>
      <div class="archive-actions">
        <button class="mini-button" data-restore-project="${project.id}">${icon.folder}<span>恢复</span></button>
        <button class="mini-button danger" data-delete-archive="${project.id}">${icon.trash}<span>删除档案</span></button>
      </div>
    </article>
  `;
}

function archiveMatches(project, query) {
  if (!query) return true;
  const taskText = (project.tasks || []).map((task) => `${task.title} ${task.owner} ${task.phase}`).join(" ");
  const stageText = normalizeStages(project.stages).map((stage) => `${stage.name} ${stage.hint}`).join(" ");
  return `${project.name} ${project.owner} ${project.note} ${stageText} ${taskText}`.toLowerCase().includes(query);
}

function applyArchiveFilter() {
  const query = archiveQuery.trim().toLowerCase();
  document.querySelectorAll("[data-archive-record]").forEach((record) => {
    const project = state.archivedProjects.find((item) => item.id === record.dataset.archiveRecord);
    record.hidden = project ? !archiveMatches(project, query) : true;
  });
}

function rundown() {
  const visible = filteredTasks();
  return currentStages()
    .map((stage, index) => {
      const tasks = visible.filter((task) => task.phase === stage.name);
      const selected = selectedTask();
      const selectedInStage = selected?.phase === stage.name;
      return `
        <div class="phase-row ${state.activePhase === stage.name ? "active" : ""}" data-phase="${stage.name}">
          <button class="phase-label" data-phase-select="${stage.name}">
            <span class="phase-index">${index + 1}</span>
            <strong>${escapeHtml(stage.name)}</strong>
            <span>${escapeHtml(stage.hint)}</span>
          </button>
          <div class="phase-work">
            ${tasks.length ? tasks.map((task) => `
              ${taskCard(task)}
              ${taskInlineDetail(task)}
            `).join("") : `<div class="empty-state">当前筛选下暂无任务</div>`}
          </div>
          <div class="phase-inline-inspector ${mobilePhaseDetailPhase === stage.name && !selectedInStage ? "open" : ""}">
            ${mobilePhaseDetailPhase === stage.name && !selectedInStage ? detailPanel() : ""}
          </div>
        </div>
      `;
    })
    .join("");
}

function taskInlineDetail(task) {
  const isOpen = mobilePhaseDetailPhase === task.phase && state.selectedId === task.id;
  return `
    <div class="task-inline-inspector ${isOpen ? "open" : ""}" data-inline-detail-for="${task.id}">
      ${isOpen ? detailPanel() : ""}
    </div>
  `;
}

function taskCard(task) {
  return `
    <article class="task-card ${task.id === state.selectedId ? "selected" : ""}" data-select="${task.id}">
      <div class="task-top">
        <p class="task-title ${task.title ? "" : "placeholder"}">${taskTitle(task)}</p>
        <span class="task-status">
          <span class="status-dot ${task.status}"></span>
          <span>${statusName(task.status)}</span>
        </span>
      </div>
      <div class="task-meta">
        <span class="owner-tag">${escapeHtml(task.owner || "未分配")}</span>
        <span>${displayDue(task.due)}</span>
      </div>
      <div class="task-progress"><span style="width:${task.progress}%"></span></div>
      <div class="task-actions">
        <button class="mini-button" title="复制任务" data-copy-task="${task.id}">${icon.copy}<span>复制</span></button>
        <button class="mini-button danger" title="删除任务" data-delete-task="${task.id}">${icon.trash}<span>${pendingDeleteId === task.id ? "确认删除" : "删除"}</span></button>
      </div>
    </article>
  `;
}

function calendar() {
  const days = [
    ["Mon", "用户回访", "cyan"],
    ["Tue", "原型评审", "green"],
    ["Wed", "开发排期", ""],
    ["Thu", "内测邀约", "cyan"],
    ["Fri", "发布页文案", ""],
    ["Sat", "社媒素材", "green"],
    ["Sun", "周复盘", ""]
  ];
  return days
    .map(([day, event, tone]) => `<div class="day"><strong>${day}</strong><div class="event ${tone}">${event}</div></div>`)
    .join("");
}

function queue() {
  return state.actions
    .map(
      (item) => `
      <div class="queue-item">
        <input type="checkbox" ${item.done ? "checked" : ""} data-action="${item.id}" />
        <span class="queue-copy"><strong>${item.title}</strong><span>${item.detail}</span></span>
        <span class="priority ${item.priority === "high" ? "high" : item.priority === "mid" ? "mid" : ""}">${item.priority.toUpperCase()}</span>

  return `
    <section class="detail-panel">
      <div class="panel-head">

          <h2>任务详情</h2>

        </div>
        <button class="panel-action-button ${task.status === "done" ? "done" : ""}" title="标记完成" data-mark-done>${icon.check}<span>${task.status === "done" ? "已完成" : "标记完成"}</span></button>
      </div>
      <div class="detail-body">
        <div class="field">
          <label for="title">任务名称</label>
          <input id="title" data-field="title" value="${task.title === TASK_TITLE_PLACEHOLDER ? "" : escapeAttr(task.title)}" placeholder="${TASK_TITLE_PLACEHOLDER}" />
        </div>
        <div class="inline-fields">
          <div class="field">
            <label for="phase">阶段</label>
            <select id="phase" data-field="phase">${stageNames().map((phase) => `<option ${phase === task.phase ? "selected" : ""}>${escapeHtml(phase)}</option>`).join("")}</select>
          </div>
          <div class="field">
            <label for="status">状态</label>
            ${statusSelect(task)}
          </div>
        </div>
        <div class="inline-fields">
          <div class="field">
            <label for="owner">负责人</label>
            <select id="owner" data-field="owner">
              ${ownerOptions(task).length ? ownerOptions(task).map((name) => `<option value="${escapeAttr(name)}" ${name === task.owner ? "selected" : ""}>${escapeHtml(name)}</option>`).join("") : `<option value="">请先录入项目人员</option>`}
            </select>
          </div>
          <div class="field">
            <label for="due">截止日期</label>
            ${datePicker(task)}
          </div>
        </div>
        <div class="field">
          <label for="progress">推进进度</label>
          <div class="progress-steps" id="progress" aria-label="推进进度">
            ${[0, 25, 50, 75, 100].map((value, index) => `
              <button class="progress-step step-${index + 1} ${task.progress >= value ? "active" : ""}" data-progress="${value}">
                <span>${value}%</span>
              </button>
            `).join("")}
          </div>
        </div>
        <div class="field">
          <label for="risk">风险等级</label>
          <select id="risk" data-field="risk">
            ${["低", "中", "高"].map((risk) => `<option ${risk === task.risk ? "selected" : ""}>${risk}</option>`).join("")}
          </select>
        </div>
        <div class="field">
          <label for="note">推进记录</label>

        </div>
        <div class="detail-actions">
          <button class="primary-button" data-save>${icon.save}<span>保存</span></button>
          <button class="ghost-button" data-copy-task="${task.id}">${icon.copy}复制</button>

        </div>
        <div class="save-state" aria-live="polite"></div>
      </div>
    </section>

function bindEvents() {
  document.removeEventListener("click", handleBlankClick);
  document.addEventListener("click", handleBlankClick);

  document.querySelectorAll("[data-page]").forEach((button) => {
    button.addEventListener("click", () => {
      state.activePage = visiblePages.includes(button.dataset.page) ? button.dataset.page : "overview";
      pendingDeleteId = null;
      pendingActionDeleteId = null;
      pendingProjectDeleteId = null;
      persist("已切换页面");
      app();
    });
  });

  document.querySelectorAll("[data-stat-target]").forEach((card) => {
    card.addEventListener("click", () => {
      jumpToStatTarget(card.dataset.statTarget);
    });
  });

  document.querySelector("[data-project-note]")?.addEventListener("input", (event) => {
    const project = currentProject();
    if (!project) return;
    project.note = event.target.value;
    persist("已保存备注");
  });

  document.querySelector("[data-add-member]")?.addEventListener("click", () => {
    addProjectMember();

function handleBlankClick(event) {
  if (!isBlankClick(event)) return;
  if (clearTransientSelection()) app();
}

function isBlankClick(event) {
  const target = event.target;
  if (!target?.closest) return false;
  return !target.closest([
    "button",
    "input",
    "select",
    "textarea",
    "label",
    "a",
    ".brand-tools",
    ".date-picker",
    ".calendar-popover",
    ".task-card",
    ".risk-card",
    ".project-card",
    ".project-modal",
    ".modal-backdrop",
    ".detail-panel",
    ".phase-label",
    ".member-chip",
    ".stat.clickable",
    ".queue-item",
    "[data-select]",
    "[data-open-project]",
    "[data-phase-select]",
    "[data-add-task]",
    "[data-add-project]"
  ].join(","));
}

function clearTransientSelection() {
  let changed = false;
  if (brandMenuOpen) {
    brandMenuOpen = false;
    changed = true;
  }
  if (calendarOpen) {
    calendarOpen = false;
    calendarMode = "day";
    changed = true;
  }
  if (state.selectedId) {
    state.selectedId = "";
    changed = true;
  }
  if (state.expandedProjectId) {
    state.expandedProjectId = "";
    changed = true;
  }
  if (mobilePhaseDetailPhase) {
    mobilePhaseDetailPhase = null;
    changed = true;
  }
  if (state.activePhase) {
    state.activePhase = "";
    changed = true;
  }
  if (pendingDeleteId) {
    pendingDeleteId = null;
    changed = true;
  }
  if (pendingActionDeleteId) {
    pendingActionDeleteId = null;
    changed = true;
  }
  if (pendingProjectDeleteId) {
    pendingProjectDeleteId = null;
    changed = true;
  }
  if (pendingMemberName) {
    pendingMemberName = null;
    changed = true;
  }
  return changed;
}

function addProjectMember() {
  const name = window.prompt("录入项目人员姓名");
  if (!name || !name.trim()) return;
  const project = currentProject();
  if (!project) return;
  project.members = Array.isArray(project.members) ? project.members : [];
  if (!project.members.includes(name.trim())) project.members.push(name.trim());
  pendingMemberName = null;
  persist("已添加项目人员");
  app();
}

function deleteProjectMember(name) {
  const project = currentProject();
  if (!project) return;
  project.members = (project.members || []).filter((member) => member !== name);
  state.tasks.forEach((task) => {
    if (task.owner === name) task.owner = project.members[0] || "";
  });
  pendingMemberName = null;
  persist("已删除项目人员");
  app();
}

function jumpToStatTarget(target) {
  if (target === "risk") {
    state.activePage = "overview";
    state.filter = "risk";
    pendingDeleteId = null;
    pendingActionDeleteId = null;
    pendingProjectDeleteId = null;
    persist("已筛选风险任务");
    app();
    return;
  }
  if (target === "launch") {
    state.activePage = "overview";
    state.filter = "all";
    const launchPhase = stageNames().includes("上线") ? "上线" : stageNames().includes("上市") ? "上市" : state.activePhase;
    state.activePhase = launchPhase;
    persist("已跳到上线阶段");
    app();
    window.setTimeout(() => {
      document.querySelector(`[data-phase="${launchPhase}"]`)?.scrollIntoView({ behavior: "smooth", block: "center" });
    }, 0);
  }
}

function togglePhaseDetail(phase) {
  const wasOpen = mobilePhaseDetailPhase === phase;
  state.activePhase = phase;
  if (wasOpen) {
    mobilePhaseDetailPhase = null;
    state.activePhase = "";
    state.selectedId = "";
    return;
  }
  mobilePhaseDetailPhase = phase;
  state.selectedId = "";
}

function moveCalendarMonth(delta) {
  const task = selectedTask();
  const base = calendarViewDate || parseDueDate(task?.due) || new Date();
  const next = new Date(base.getFullYear(), base.getMonth() + delta, 1);
  const min = new Date(2025, 0, 1);
  const max = new Date(2099, 11, 1);
  if (next < min || next > max) return;
  calendarViewDate = next;
  app();
}

function isCalendarDateAllowed(date) {
  return date >= new Date(2025, 0, 1) && date <= new Date(2099, 11, 31);
}

function defaultDueForView() {
  const now = new Date();
  if (state.view === "week") return formatDueDate(endOfWeek(now));
  if (state.view === "month") return formatDueDate(endOfMonth(now));
  return formatDueDate(now);
}

function formatDueDate(date) {
  return `${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, "0")}-${String(date.getDate()).padStart(2, "0")}`;
}

function updateTaskField(field, options = {}) {
  const shouldRender = options.render !== false;
  const task = selectedTask();
  if (!task) return;
  const key = field.dataset.field;
  task[key] = key === "progress" ? Number(field.value) : field.value;
  if (key === "title") {
    task.title = shouldRender ? field.value.trim() : field.value;
  }
  if (key === "phase") {
    state.activePhase = field.value;
    persist("已移动到对应阶段");
    app();
    return;
  }
  if (["owner", "status", "title", "due"].includes(key)) {
    if (!shouldRender) {
      persist("已同步任务卡");
      return;
    }
    persist("已同步任务卡");
    app();
    return;
  }
  persist();
}

function createTask() {
  const project = currentProject();
  if (!project) {
    addProject();
    return;
  }
  const id = `t${Date.now()}`;
  const phase = activeTaskPhase(project);
  state.tasks.push({
    id,
    projectId: project.id,
    phase,
    title: "",
    owner: project.members?.[0] || "",
    due: defaultDueForView(),
    status: "todo",
    progress: 0,
    note: "",
    risk: "中"
  });
  state.selectedId = id;
  state.activePage = "overview";
  state.activePhase = phase;
  state.filter = "all";
  mobilePhaseDetailPhase = phase;
  pendingDeleteId = null;
  persist("已新增任务");
  app();
}

  projectDraft = createProjectDraft();
  editingProjectId = null;
  projectModalOpen = true;
  app();
}

function saveProjectDraft() {
  if (!projectDraft) projectDraft = createProjectDraft();
  const stages = normalizeStages(projectDraft.stages, odmDefaultStages);
  if (editingProjectId) {
    const project = state.projects.find((item) => item.id === editingProjectId);
    if (!project) return;
    const oldStageNames = stageNames(project);
    project.name = projectDraft.name.trim() || project.name;
    project.note = projectDraft.note.trim() || project.note;
    project.stages = stages;
    state.tasks.forEach((task) => {
      const index = oldStageNames.indexOf(task.phase);
      if (index >= 0 && stages[index]) task.phase = stages[index].name;
    });
    if (!stageNames(project).includes(state.activePhase)) {
      state.activePhase = stages[0]?.name || state.activePhase;
    }
    projectModalOpen = false;
    projectDraft = null;
    editingProjectId = null;
    persist("已保存产品");
    app();
    return;
  }
  const id = `p${Date.now()}`;
  const firstStage = stages[0]?.name || "立项";
  state.projects.push({
    id,
    name: projectDraft.name.trim() || "新 ODM 产品",
    owner: "Founder",
    due: "待定",
    urgency: "yellow",
    note: projectDraft.note.trim() || "从设计、打样、量产、出货到上市的 ODM 产品推进面板。",
    members: [],
    stages
  });
  state.selectedProjectId = id;
  state.expandedProjectId = id;
  state.activePhase = firstStage;
  pendingProjectDeleteId = null;
  projectModalOpen = false;
  projectDraft = null;
  editingProjectId = null;
  persist("已创建产品");
  app();
}

function editProject(id) {
  const project = state.projects.find((item) => item.id === id);
  if (!project) return;
  projectDraft = {
    name: project.name,
    note: project.note || "",
    stages: cloneData(normalizeStages(project.stages))
  };
  editingProjectId = id;
  projectModalOpen = true;
  pendingProjectDeleteId = null;
  app();
}

function duplicateProject(id) {
  const source = state.projects.find((project) => project.id === id);
  if (!source) return;
  const copy = {
    ...source,
    id: `p${Date.now()}`,
    name: `${source.name} 副本`,
    members: cloneData(source.members || []),
    stages: cloneData(source.stages || null)
  };
  const index = state.projects.findIndex((project) => project.id === id);
  state.projects.splice(index + 1, 0, copy);
  state.selectedProjectId = copy.id;
  state.expandedProjectId = copy.id;
  pendingProjectDeleteId = null;
  persist("已复制产品");
  app();
}

function activeProjectTasks(project) {
  return state.tasks.filter((task) => task.projectId === project.id || (!task.projectId && project.id === state.selectedProjectId));
}

function archiveProject(id) {
  const index = state.projects.findIndex((project) => project.id === id);
  if (index === -1) return;
  const project = state.projects[index];
  const archivedTasks = activeProjectTasks(project).map((task) => ({ ...task, projectId: project.id }));
  state.archivedProjects.unshift({
    ...project,
    archivedAt: new Date().toISOString(),
    tasks: archivedTasks
  });
  state.tasks = state.tasks.filter((task) => !archivedTasks.some((archivedTask) => archivedTask.id === task.id));
  state.projects.splice(index, 1);
  const nextProject = state.projects[Math.max(0, index - 1)] || state.projects[0] || null;
  state.selectedProjectId = nextProject?.id || "";
  state.expandedProjectId = nextProject?.id || "";
  state.activePhase = stageNames(nextProject)[0] || "立项";
  state.activePage = "archive";
  pendingProjectDeleteId = null;
  persist("项目已归档");
  app();
}

function restoreArchivedProject(id) {
  const index = state.archivedProjects.findIndex((project) => project.id === id);
  if (index === -1) return;
  const archived = state.archivedProjects[index];
  const { tasks = [], archivedAt, ...project } = archived;
  state.archivedProjects.splice(index, 1);
  state.projects.push(project);
  state.tasks.push(...tasks.map((task) => ({ ...task, projectId: project.id })));
  state.selectedProjectId = project.id;
  state.expandedProjectId = project.id;
  state.activePhase = stageNames(project)[0] || "立项";
  state.activePage = "overview";
  persist("项目已恢复");
  app();
}

function deleteArchivedProject(id) {
  state.archivedProjects = state.archivedProjects.filter((project) => project.id !== id);
  persist("已删除归档");
  app();
}

function deleteProject(id, confirmed = false) {
  if (!confirmed) {
    pendingProjectDeleteId = id;
    pendingDeleteId = null;
    pendingActionDeleteId = null;
    app();
    return;
  }
  if (pendingProjectDeleteId !== id) return;
  const index = state.projects.findIndex((project) => project.id === id);
  if (index === -1) return;
  const deletingSelectedProject = id === state.selectedProjectId;
  state.tasks = state.tasks.filter((task) => task.projectId ? task.projectId !== id : !deletingSelectedProject);
  state.projects.splice(index, 1);
  const nextProject = state.projects[Math.max(0, index - 1)] || state.projects[0];
  state.selectedProjectId = nextProject?.id || "";
  state.expandedProjectId = nextProject?.id || "";
  state.activePhase = stageNames(nextProject)[0] || "立项";
  pendingProjectDeleteId = null;
  persist("已删除产品");
  app();
}

function setProjectUrgency(id, urgency) {
  const project = state.projects.find((item) => item.id === id);
  if (!project) return;
  project.urgency = urgency;
  pendingProjectDeleteId = null;
  persist(`已标记为${urgencyLabel(urgency)}`);
  app();
}

function downloadJson(filename, data) {
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: "application/json" });
  const url = URL.createObjectURL(blob);
  const link = document.createElement("a");
  link.href = url;
  link.download = filename;
  document.body.appendChild(link);
  link.click();
  link.remove();
  URL.revokeObjectURL(url);
}

function toggleExportProject(projectId) {
  exportProjectIds = exportProjectIds.includes(projectId)
    ? exportProjectIds.filter((id) => id !== projectId)
    : [...exportProjectIds, projectId];
}

function toggleExportAllProjects() {
  exportProjectIds = exportProjectIds.length === state.projects.length ? [] : state.projects.map((project) => project.id);
}

function projectTasksForExport(project) {
  return state.tasks.filter((task) => task.projectId === project.id || (!task.projectId && project.id === state.selectedProjectId));
}

function exportSelectedProjectTasks() {
  if (!exportProjectIds.length) {
    persist("请先选择产品");
    return;
  }
  const projects = state.projects.filter((project) => exportProjectIds.includes(project.id));
  const tasks = projects.flatMap((project) => projectTasksForExport(project));
  const filename = projects.length === 1 ? `${projects[0].name || "money-come"}-tasks-${dateKey(new Date())}.json` : `money-come-selected-tasks-${dateKey(new Date())}.json`;
  downloadJson(filename, {
    exportType: "money-come-task-bundle",
    version: 2,
    exportedAt: new Date().toISOString(),
    projects,
    stagesByProject: Object.fromEntries(projects.map((project) => [project.id, stageNames(project)])),
    tasks
  });
  brandMenuOpen = false;
  persist("已导出任务");
  app();
}

function importAllData(file) {
  if (!file) return;
  const reader = new FileReader();
  reader.addEventListener("load", () => {
    try {
      const data = JSON.parse(String(reader.result || "{}"));
      if (Array.isArray(data)) {
        importTaskBundle({ tasks: data });
      } else if (Array.isArray(data.tasks) && !data.projects) {
        importTaskBundle({ tasks: data.tasks });
      } else if (isTaskBundle(data)) {
        importTaskBundle(data);
      } else {
        state = normalizeState(data);
      }
      pendingDeleteId = null;
      pendingActionDeleteId = null;
      pendingProjectDeleteId = null;
      pendingMemberName = null;
      persist("已导入数据");
      app();
    } catch {
      persist("导入失败，请检查 JSON 文件");
    }
  });
  reader.readAsText(file);
}

function isTaskBundle(data) {
  if (!data || typeof data !== "object") return false;
  if (data.exportType === "money-come-task-bundle") return true;
  return Array.isArray(data.tasks) && Array.isArray(data.projects) && Boolean(data.stagesByProject || data.exportedAt);
}

function importTaskBundle(data) {
  const importedProjects = Array.isArray(data.projects) && data.projects.length
    ? data.projects.map((project) => ({
        owner: "Founder",
        due: "待定",
        urgency: "yellow",
        note: "",
        members: [],
        stages: normalizeStages(project.stages || data.stagesByProject?.[project.id] || odmDefaultStages),
        ...project
      }))
    : [currentProject()].filter(Boolean);
  const fallbackProject = importedProjects[0] || currentProject();
  if (!fallbackProject) {
    state.tasks = Array.isArray(data.tasks) ? data.tasks : [];
    return;
  }

  importedProjects.forEach((project) => {
    const index = state.projects.findIndex((item) => item.id === project.id);
    if (index >= 0) {
      state.projects[index] = { ...state.projects[index], ...project };
    } else {
      state.projects.push(project);
    }
  });

  const importedTasks = (Array.isArray(data.tasks) ? data.tasks : []).map((task) => {
    const taskProjectId = task.projectId || fallbackProject.id;
    const project = importedProjects.find((item) => item.id === taskProjectId) || fallbackProject;
    const phasesForProject = stageNames(project);
    return {
      id: task.id || `t${Date.now()}-${Math.random().toString(16).slice(2)}`,
      projectId: project.id,
      phase: phasesForProject.includes(task.phase) ? task.phase : phasesForProject[0] || "立项",
      title: task.title || "",
      owner: task.owner || "",
      due: task.due || formatDueDate(new Date()),
      status: ["todo", "active", "risk", "done"].includes(task.status) ? task.status : "todo",
      progress: Number(task.progress || 0),
      note: task.note || "",
      risk: task.risk || "中"
    };
  });

  const importedProjectIds = new Set(importedProjects.map((project) => project.id));
  state.tasks = state.tasks.filter((task) => !importedProjectIds.has(task.projectId));
  state.tasks.push(...importedTasks);
  state.selectedProjectId = fallbackProject.id;
  state.expandedProjectId = fallbackProject.id;
  state.selectedId = importedTasks[0]?.id || "";
  state.activePage = "overview";
  state.activePhase = importedTasks[0]?.phase || stageNames(fallbackProject)[0] || "立项";
  state.filter = "all";
  mobilePhaseDetailPhase = importedTasks[0]?.phase || null;
}

function duplicateTask(id) {
  const source = state.tasks.find((task) => task.id === id);
  if (!source) return;
  const copy = {
    ...source,
    id: `t${Date.now()}`,
    title: `${source.title || TASK_TITLE_PLACEHOLDER} 副本`,
    status: "todo",
    progress: 0
  };
  const index = state.tasks.findIndex((task) => task.id === id);
  state.tasks.splice(index + 1, 0, copy);
  state.selectedId = copy.id;
  pendingDeleteId = null;
  persist("已复制任务");
  app();
}

function deleteTask(id) {
  if (pendingDeleteId !== id) {
    pendingDeleteId = id;
    pendingActionDeleteId = null;
    app();
    return;
  }
  const index = state.tasks.findIndex((task) => task.id === id);
  if (index === -1) return;
  state.tasks.splice(index, 1);
  state.selectedId = state.tasks[Math.max(0, index - 1)]?.id || state.tasks[0]?.id || "";
  pendingDeleteId = null;
  persist("已删除任务");
  app();
}

function duplicateAction(id) {
  const source = state.actions.find((action) => action.id === id);
  if (!source) return;
  const copy = {
    ...source,
    id: `a${Date.now()}`,
    title: `${source.title} 副本`,
    done: false
  };
  const index = state.actions.findIndex((action) => action.id === id);
  state.actions.splice(index + 1, 0, copy);
  pendingActionDeleteId = null;
  persist("已复制行动");
  app();
}

function deleteAction(id) {
  if (pendingActionDeleteId !== id) {
    pendingActionDeleteId = id;
    pendingDeleteId = null;
    app();
    return;
  }
  state.actions = state.actions.filter((action) => action.id !== id);
  pendingActionDeleteId = null;
  persist("已删除行动");
  app();
}

function escapeHtml(value) {
  return String(value).replace(/[&<>"']/g, (char) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" })[char]);
}

function escapeAttr(value) {
  return escapeHtml(value);
}

function taskTitle(task) {
  return escapeHtml(task.title || TASK_TITLE_PLACEHOLDER);
}

function setBrandMenuPosition(button) {
  if (!button) return;
  const rect = button.getBoundingClientRect();
  const menuWidth = Math.min(320, Math.max(0, window.innerWidth - 28));
  const left = Math.min(Math.max(14, rect.left), Math.max(14, window.innerWidth - menuWidth - 14));
  document.documentElement.style.setProperty("--brand-menu-top", `${Math.round(rect.bottom + 6)}px`);
  document.documentElement.style.setProperty("--brand-menu-left", `${Math.round(left)}px`);
  document.documentElement.style.setProperty("--brand-menu-width", `${Math.round(menuWidth)}px`);
}

function positionBrandMenu() {
  if (!brandMenuOpen) return;
  setBrandMenuPosition(document.querySelector("[data-toggle-brand-menu]"));
}

function showStartupError(error) {
  const root = document.getElementById("app");
  if (!root) return;
  root.innerHTML = `
    <div class="startup-error">
      <strong>页面启动失败</strong>
      <span>请刷新页面，或把这段信息发给 Codex：</span>
      <code>${escapeHtml(error?.message || String(error))}</code>
    </div>
  `;
}

try {
  app();
} catch (error) {
  showStartupError(error);
  console.error(error);
}
